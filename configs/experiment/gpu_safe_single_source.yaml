experiment_name: gpu_safe_single_source
seed: 42
device: cuda
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: false
  save_analysis: false
  disable_cudnn: true
  cudnn_benchmark: false
  num_workers: 0
  pin_memory: false

protocol_override:
  setting: single_source
  source_domains:
    - mode1
  target_domain: mode2
  preferred_fold: Fold 1

notes:
  - Conservative GPU diagnosis config.
  - Keeps CUDA enabled but disables cuDNN autotune, pinned memory, and post-training analysis export.

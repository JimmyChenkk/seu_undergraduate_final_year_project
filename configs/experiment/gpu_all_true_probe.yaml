experiment_name: gpu_all_true_probe
seed: 42
device: cuda
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: false
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  num_workers: 0
  pin_memory: true
  show_progress: false

protocol_override:
  setting: single_source
  source_domains:
    - mode1
  target_domain: mode2
  preferred_fold: Fold 1

notes:
  - Runtime probe with cuDNN, cuDNN benchmark, and pinned memory all enabled together.
  - Keeps the scene fixed so we can compare against the conservative DANN runs without changing the task itself.

experiment_name: tep_ot_single_source_jdot_125_fixedfold
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: true
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  amp: true
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  non_blocking_transfers: false
  show_progress: false
  evaluation_interval: 5
  selection_interval: 5
  early_stopping_interval: 5
  final_epoch_evaluation: true
  final_selection_evaluation: true
  refresh_batch_outputs: true
  early_stopping_patience:
  early_stopping_min_delta: 0.0
  early_stopping_min_epochs: 70

automation:
  methods:
    - source_only
    - cdan_ts
    - dsan
    - codats
    - deepjdot
    - jdot
    - tp_jdot
    - cbtp_jdot
    - target_only
  single_source_scenes:
    - mode1->mode2
    - mode2->mode1
    - mode1->mode5
    - mode5->mode1
    - mode2->mode5
    - mode5->mode2

method_overrides:
  target_only:
    runtime:
      model_selection: target_confidence
      early_stopping_metric: target_confidence
      early_stopping_patience:
      early_stopping_min_delta: 0.0
      early_stopping_min_epochs: 70
  deepjdot:
    optimization:
      epochs: 120
      batch_size: 64
      learning_rate: 0.0001
      weight_decay: 0.0
      max_grad_norm: 5.0
    runtime:
      model_selection: hybrid_source_eval_target_confidence
      early_stopping_metric: hybrid_source_eval_target_confidence
      selection_weights:
        source_eval: 0.70
        target_confidence: 0.30
      early_stopping_weights:
        source_eval: 0.70
        target_confidence: 0.30
      early_stopping_patience:
      early_stopping_min_delta: 0.0
      early_stopping_min_epochs: 120
    loss:
      adaptation_weight: 0.55
      adaptation_schedule: warm_start
      adaptation_max_steps: 2200
      reg_dist: 0.08
      reg_cl: 1.0
      normalize_feature_cost: true
      transport_solver: sinkhorn
      sinkhorn_reg: 0.05
      sinkhorn_num_iter_max: 200
  jdot:
    backbone: &jdot_backbone
      name: fcn_temporal
      embedding_dim: 128
      classifier_hidden_dim: 128
      dropout: 0.15
    optimization: &jdot_optimization
      epochs: 70
      batch_size: 64
      learning_rate: 0.0001
      weight_decay: 0.0001
    runtime: &jdot_runtime
      model_selection: target_free_checkpoint_guard
      early_stopping_metric: target_free_checkpoint_guard
      selection_weights:
        source_eval: 1.00
        target_entropy_badness: 0.10
        confidence_collapse: 1.00
        class_distribution_collapse: 0.50
        ot_cost_instability: 0.10
        embedding_norm_instability: 0.05
      selection_params:
        confidence_ceiling: 0.85
        target_entropy_floor: 0.15
        class_entropy_floor: 0.35
      early_stopping_weights:
        source_eval: 1.00
        target_entropy_badness: 0.10
        confidence_collapse: 1.00
        class_distribution_collapse: 0.50
        ot_cost_instability: 0.10
        embedding_norm_instability: 0.05
      early_stopping_params:
        confidence_ceiling: 0.85
        target_entropy_floor: 0.15
        class_entropy_floor: 0.35
      early_stopping_patience:
      early_stopping_min_delta: 0.0
      early_stopping_min_epochs: 70
    loss: &jdot_loss
      adaptation_weight: 0.30
      source_ce_weight: 1.0
      feature_weight: 0.03
      label_weight: 1.0
      prototype_weight: 0.0
      use_source_class_balance: false
      normalize_costs: true
      transport_solver: sinkhorn
      sinkhorn_reg: 0.05
      sinkhorn_num_iter_max: 200
      alignment_start_step: 700
      alignment_ramp_steps: 1200
      ot_feature_normalize: true
      ot_source_stop_gradient: true
      embedding_norm_weight: 0.0001
  tp_jdot:
    backbone: *jdot_backbone
    optimization: *jdot_optimization
    runtime: *jdot_runtime
    loss:
      <<: *jdot_loss
      prototype_mode: tp_barycentric
      prototype_weight: 0.04
      prototype_in_coupling: false
      prototype_distance: normalized_l2
      prototype_cost_clip: p90
      ot_class_entropy_gate: true
      min_class_transport_mass: 0.0001
      class_mass_weight: sqrt
      prototype_start_step: 1200
      prototype_warmup_steps: 1800
  cbtp_jdot:
    backbone: *jdot_backbone
    optimization: *jdot_optimization
    runtime: *jdot_runtime
    loss:
      <<: *jdot_loss
      base_tp_mode: tp_barycentric
      prototype_weight: 0.06
      prototype_in_coupling: false
      prototype_distance: normalized_l2
      prototype_cost_clip: p90
      ot_class_entropy_gate: true
      min_class_transport_mass: 0.0001
      class_mass_weight: sqrt
      prototype_start_step: 1200
      prototype_warmup_steps: 1800
      pseudo_start_step: 1200
      tau_start: 0.95
      tau_end: 0.85
      tau_steps: 1200
      pseudo_weight: 0.03
      class_balance_clip_min: 0.5
      class_balance_clip_max: 3.0
      consistency_weight: 0.02

protocol_override:
  setting: single_source
  source_domains:
    - mode1
  target_domain: mode2
  random_fold_enabled: false
  preferred_fold: Fold 1
  source_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  target_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  fold_sampling:
    enabled: false
    strategy: fixed
    random_per_scene: false
    random_per_run: false
    source_fold_choices: [1, 2, 3, 4, 5]
    target_fold_choices: [1, 2, 3, 4, 5]
    note: "Fixed fold policy copied from the previous mode1/2/5 benchmark configs."
  scene_fold_overrides:
    m1_m2:
      source_fold: 2
      target_fold: 4
    m2_m1:
      source_fold: 5
      target_fold: 3
    m1_m5:
      source_fold: 4
      target_fold: 3
    m5_m1:
      source_fold: 4
      target_fold: 4
    m2_m5:
      source_fold: 1
      target_fold: 3
    m5_m2:
      source_fold: 3
      target_fold: 4

notes:
  - Formal single-source JDOT-line probe for the mode1/2/5 cluster.
  - Methods: Source-Only, CDAN-TS, DSAN, CoDATS, DeepJDOT, JDOT, TP-JDOT, CBTP-JDOT, and Target-Only upper bound.
  - Target-Only is supervised upper bound only; do not discuss it as unsupervised DA.
  - Check comparison_summary plus each run's per_class_recall, checkpoint_diagnostics, confusion_matrix, and t-SNE artifacts.

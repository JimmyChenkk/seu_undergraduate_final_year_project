experiment_name: tep_ot_methods_9tasks_fixedfold
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: true
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  amp: true
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  non_blocking_transfers: false
  show_progress: false
  evaluation_interval: 5
  selection_interval: 5
  early_stopping_interval: 5
  final_epoch_evaluation: true
  final_selection_evaluation: true
  refresh_batch_outputs: true
  model_selection: hybrid_source_eval_target_confidence
  early_stopping_metric: hybrid_source_eval_target_confidence
  selection_weights:
    source_eval: 0.80
    target_confidence: 0.20
  early_stopping_weights:
    source_eval: 0.80
    target_confidence: 0.20
  early_stopping_patience: 12
  early_stopping_min_delta: 0.0005
  early_stopping_min_epochs: 20

automation:
  methods:
    - source_only
    - codats
    - cdan_ts
    - dsan
    - deepjdot
    - wjdot
    - tp_wjdot
    - cbtp_wjdot
    - ms_cbtp_wjdot
    - target_only
  single_source_scenes:
    - mode1->mode2
    - mode2->mode1
    - mode1->mode5
    - mode5->mode1
    - mode2->mode5
    - mode5->mode2
  multisource_scenes:
    - mode1+mode2->mode5
    - mode2+mode5->mode1
    - mode1+mode5->mode2

method_overrides:
  target_only:
    runtime:
      model_selection: target_confidence
      early_stopping_metric: target_confidence
      early_stopping_patience: 18
      early_stopping_min_delta: 0.0005
      early_stopping_min_epochs: 35
  all:
    deepjdot:
      optimization:
        batch_size: 64
      loss:
        transport_solver: sinkhorn
        sinkhorn_reg: 0.05
        sinkhorn_num_iter_max: 200
        normalize_feature_cost: true
    wjdot:
      optimization:
        batch_size: 64
      loss:
        adaptation_weight: 0.35
        feature_weight: 0.03
        transport_solver: sinkhorn
        sinkhorn_reg: 0.05
        sinkhorn_num_iter_max: 200
        alignment_start_step: 350
        alignment_ramp_steps: 700
        embedding_norm_weight: 0.0001
    tp_wjdot:
      runtime:
        model_selection: target_free_checkpoint_guard
        early_stopping_metric: target_free_checkpoint_guard
        selection_weights:
          source_eval: 1.00
          target_entropy_badness: 0.10
          confidence_collapse: 1.00
          class_distribution_collapse: 0.50
          ot_cost_instability: 0.10
          embedding_norm_instability: 0.05
        selection_params:
          confidence_ceiling: 0.66
          target_entropy_floor: 0.15
          class_entropy_floor: 0.35
        early_stopping_weights:
          source_eval: 1.00
          target_entropy_badness: 0.10
          confidence_collapse: 1.00
          class_distribution_collapse: 0.50
          ot_cost_instability: 0.10
          embedding_norm_instability: 0.05
        early_stopping_params:
          confidence_ceiling: 0.66
          target_entropy_floor: 0.15
          class_entropy_floor: 0.35
      backbone:
        dropout: 0.2
      optimization:
        batch_size: 64
        weight_decay: 0.0001
      loss:
        adaptation_weight: 0.25
        feature_weight: 0.03
        transport_solver: sinkhorn
        sinkhorn_reg: 0.05
        sinkhorn_num_iter_max: 200
        prototype_mode: tp_barycentric
        prototype_weight: 0.05
        prototype_in_coupling: false
        prototype_distance: normalized_l2
        prototype_cost_clip: p90
        ot_class_entropy_gate: true
        min_class_transport_mass: 0.0001
        class_mass_weight: sqrt
        alignment_start_step: 700
        alignment_ramp_steps: 1200
        prototype_start_step: 1200
        prototype_warmup_steps: 1800
        embedding_norm_weight: 0.0001
    cbtp_wjdot:
      runtime:
        model_selection: target_free_checkpoint_guard
        early_stopping_metric: target_free_checkpoint_guard
        selection_weights:
          source_eval: 1.00
          target_entropy_badness: 0.10
          confidence_collapse: 1.00
          class_distribution_collapse: 0.50
          ot_cost_instability: 0.10
          embedding_norm_instability: 0.05
        selection_params:
          confidence_ceiling: 0.80
          target_entropy_floor: 0.15
          class_entropy_floor: 0.35
        early_stopping_weights:
          source_eval: 1.00
          target_entropy_badness: 0.10
          confidence_collapse: 1.00
          class_distribution_collapse: 0.50
          ot_cost_instability: 0.10
          embedding_norm_instability: 0.05
        early_stopping_params:
          confidence_ceiling: 0.80
          target_entropy_floor: 0.15
          class_entropy_floor: 0.35
      backbone:
        dropout: 0.15
      optimization:
        batch_size: 64
        weight_decay: 0.0001
      loss:
        adaptation_weight: 0.35
        feature_weight: 0.03
        transport_solver: sinkhorn
        sinkhorn_reg: 0.05
        sinkhorn_num_iter_max: 200
        base_tp_mode: tp_barycentric
        prototype_weight: 0.08
        prototype_in_coupling: false
        prototype_distance: normalized_l2
        prototype_cost_clip: p90
        ot_class_entropy_gate: true
        min_class_transport_mass: 0.0001
        class_mass_weight: sqrt
        alignment_start_step: 350
        alignment_ramp_steps: 700
        prototype_start_step: 700
        prototype_warmup_steps: 1200
        pseudo_start_step: 700
        tau_end: 0.80
        tau_steps: 1200
        pseudo_weight: 0.06
        class_balance_clip_min: 0.5
        class_balance_clip_max: 3.0
        consistency_weight: 0.04
        embedding_norm_weight: 0.0001
    ms_cbtp_wjdot:
      runtime:
        model_selection: target_free_checkpoint_guard
        early_stopping_metric: target_free_checkpoint_guard
        selection_weights:
          source_eval: 1.00
          target_entropy_badness: 0.10
          confidence_collapse: 1.00
          class_distribution_collapse: 0.50
          ot_cost_instability: 0.10
          embedding_norm_instability: 0.05
        selection_params:
          confidence_ceiling: 0.80
          target_entropy_floor: 0.15
          class_entropy_floor: 0.35
        early_stopping_weights:
          source_eval: 1.00
          target_entropy_badness: 0.10
          confidence_collapse: 1.00
          class_distribution_collapse: 0.50
          ot_cost_instability: 0.10
          embedding_norm_instability: 0.05
        early_stopping_params:
          confidence_ceiling: 0.80
          target_entropy_floor: 0.15
          class_entropy_floor: 0.35
      backbone:
        dropout: 0.15
      optimization:
        batch_size: 64
        weight_decay: 0.0001
      loss:
        adaptation_weight: 0.35
        feature_weight: 0.03
        transport_solver: sinkhorn
        sinkhorn_reg: 0.05
        sinkhorn_num_iter_max: 200
        base_tp_mode: tp_barycentric
        prototype_weight: 0.08
        prototype_in_coupling: false
        prototype_distance: normalized_l2
        prototype_cost_clip: p90
        ot_class_entropy_gate: true
        min_class_transport_mass: 0.0001
        class_mass_weight: sqrt
        alignment_start_step: 350
        alignment_ramp_steps: 700
        prototype_start_step: 700
        prototype_warmup_steps: 1200
        pseudo_start_step: 700
        tau_end: 0.80
        tau_steps: 1200
        pseudo_weight: 0.06
        class_balance_clip_min: 0.5
        class_balance_clip_max: 3.0
        consistency_weight: 0.04
        embedding_norm_weight: 0.0001
        source_weight_temperature: 1.0
        class_weight_temperature: 1.0

protocol_override:
  setting: single_source
  source_domains:
    - mode1
  target_domain: mode2
  random_fold_enabled: false
  preferred_fold: Fold 1
  source_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  target_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  fold_sampling:
    enabled: false
    strategy: fixed
    random_per_scene: false
    random_per_run: false
    source_fold_choices: [1, 2, 3, 4, 5]
    target_fold_choices: [1, 2, 3, 4, 5]
    note: "Fixed fold policy: each mode1/2/5 scene uses the explicit fold assignment below."
  scene_fold_overrides:
    m1_m2:
      source_fold: 2
      target_fold: 4
    m2_m1:
      source_fold: 5
      target_fold: 3
    m1_m5:
      source_fold: 4
      target_fold: 3
    m5_m1:
      source_fold: 4
      target_fold: 4
    m2_m5:
      source_fold: 1
      target_fold: 3
    m5_m2:
      source_fold: 3
      target_fold: 4
    m1_2_m5:
      source_folds_by_domain:
        mode1: 4
        mode2: 1
      target_fold: 3
    m1_5_m2:
      source_folds_by_domain:
        mode1: 2
        mode5: 3
      target_fold: 4
    m2_5_m1:
      source_folds_by_domain:
        mode2: 4
        mode5: 4
      target_fold: 4

notes:
  - Updated thesis grid for the new OT/WJDOT innovation line.
  - Target-Only is an upper bound only and should not be discussed as a fair DA baseline.
  - Target eval labels are used only by the trainer's final evaluation path.

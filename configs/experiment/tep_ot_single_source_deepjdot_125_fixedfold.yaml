experiment_name: tep_ot_single_source_deepjdot_125_fixedfold
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: true
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  amp: true
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  non_blocking_transfers: false
  show_progress: false
  evaluation_interval: 5
  selection_interval: 5
  early_stopping_interval: 5
  final_epoch_evaluation: true
  final_selection_evaluation: true
  refresh_batch_outputs: true
  early_stopping_patience:
  early_stopping_min_delta: 0.0
  early_stopping_min_epochs: 120

automation:
  methods:
    - source_only
    - deepjdot
    - tp_deepjdot
    - cbtp_deepjdot
    - cdan_ts
    - codats
    - dsan
    - target_only
  single_source_scenes:
    - mode1->mode2
    - mode2->mode1
    - mode1->mode5
    - mode5->mode1
    - mode2->mode5
    - mode5->mode2

method_overrides:
  target_only:
    runtime:
      model_selection: target_confidence
      early_stopping_metric: target_confidence
      early_stopping_patience:
      early_stopping_min_delta: 0.0
      early_stopping_min_epochs: 120
  deepjdot:
    optimization: &deepjdot_optimization
      epochs: 120
      batch_size: 64
      learning_rate: 0.0001
      weight_decay: 0.0
      max_grad_norm: 5.0
    runtime: &deepjdot_runtime
      model_selection: hybrid_source_eval_target_confidence
      early_stopping_metric: hybrid_source_eval_target_confidence
      selection_weights:
        source_eval: 0.70
        target_confidence: 0.30
      early_stopping_weights:
        source_eval: 0.70
        target_confidence: 0.30
      early_stopping_patience:
      early_stopping_min_delta: 0.0
      early_stopping_min_epochs: 120
    loss: &deepjdot_loss
      adaptation_weight: 0.55
      adaptation_schedule: warm_start
      adaptation_max_steps: 2200
      reg_dist: 0.08
      reg_cl: 1.0
      normalize_feature_cost: true
      transport_solver: sinkhorn
      sinkhorn_reg: 0.05
      sinkhorn_num_iter_max: 200
  tp_deepjdot:
    optimization: *deepjdot_optimization
    runtime: *deepjdot_runtime
    loss:
      <<: *deepjdot_loss
      prototype_weight: 0.05
      prototype_source_weight: 0.10
      prototype_target_weight: 1.05
      prototype_distance: normalized_l2
      prototype_start_step: 650
      prototype_warmup_steps: 1000
      prototype_confidence_threshold: 0.35
      prototype_target_confidence_power: 1.8
      prototype_probability_temperature: 0.65
      prototype_class_balance: false
  cbtp_deepjdot:
    optimization: *deepjdot_optimization
    runtime: *deepjdot_runtime
    loss:
      <<: *deepjdot_loss
      prototype_weight: 0.055
      prototype_source_weight: 0.10
      prototype_target_weight: 1.05
      prototype_distance: normalized_l2
      prototype_start_step: 650
      prototype_warmup_steps: 1000
      prototype_confidence_threshold: 0.35
      prototype_target_confidence_power: 1.8
      prototype_probability_temperature: 0.65
      prototype_class_balance: true
      prototype_class_balance_clip_min: 0.5
      prototype_class_balance_clip_max: 2.0
      target_im_weight: 0.035
      target_im_start_step: 900
      target_im_warmup_steps: 900
      target_im_temperature: 0.85
      target_im_entropy_weight: 1.0
      target_im_diversity_weight: 0.8
      pseudo_weight: 0.006
      pseudo_start_step: 1900
      pseudo_warmup_steps: 1000
      tau_start: 0.88
      tau_end: 0.80
      tau_steps: 1200
      pseudo_min_acceptance: 0.06
      pseudo_min_classes: 4
      class_balance_clip_min: 0.5
      class_balance_clip_max: 2.5
      pseudo_confidence_power: 1.0

protocol_override:
  setting: single_source
  source_domains:
    - mode1
  target_domain: mode2
  random_fold_enabled: false
  preferred_fold: Fold 1
  source_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  target_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  fold_sampling:
    enabled: false
    strategy: fixed
    random_per_scene: false
    random_per_run: false
    source_fold_choices: [1, 2, 3, 4, 5]
    target_fold_choices: [1, 2, 3, 4, 5]
    note: "Fixed fold policy copied from the previous mode1/2/5 benchmark configs."
  scene_fold_overrides:
    m1_m2:
      source_fold: 2
      target_fold: 4
    m2_m1:
      source_fold: 5
      target_fold: 3
    m1_m5:
      source_fold: 4
      target_fold: 3
    m5_m1:
      source_fold: 4
      target_fold: 4
    m2_m5:
      source_fold: 1
      target_fold: 3
    m5_m2:
      source_fold: 3
      target_fold: 4

notes:
  - Formal single-source DeepJDOT-line run for the mode1/2/5 cluster.
  - Methods: Source-Only, CDAN-TS, DSAN, CoDATS, DeepJDOT, TP-DeepJDOT, CBTP-DeepJDOT, and Target-Only upper bound.
  - Target-Only is supervised upper bound only; do not discuss it as an unsupervised DA baseline.
  - Expected innovation chain: DeepJDOT < TP-DeepJDOT < CBTP-DeepJDOT, with the two proposed stages also compared against CDAN-TS, DSAN, and CoDATS.

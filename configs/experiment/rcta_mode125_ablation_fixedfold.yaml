notes:
  - 3 cumulative RCTA stages x 9 mode1/2/5 handshake scenes = 27 ablation runs.
  - A: hybrid alignment with mean-teacher temporal consistency.
  - A+B: A plus reliability-gated pseudo-label learning.
  - A+B+C: A+B plus dual prototypes, curriculum, and multi-source reliability weighting.
  - Base-only and final integration are not separate paper rows; they are covered by the main benchmark and the complete A+B+C method.
  - These scene-specific overrides mirror the smoke experiment because the best stability came from them.
  - save_analysis=true keeps this ablation aligned with the smoke experiment so figures are available when needed.
  - Evaluation/selection/early-stopping cadence now mirrors the smoke experiment for better stability checking.
  - Fold policy mirrors the stable smoke setup and the fixed-fold benchmark policy for the mode1/2/5 scenes.

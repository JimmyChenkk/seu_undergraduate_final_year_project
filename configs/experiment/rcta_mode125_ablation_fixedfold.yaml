experiment_name: rcta_mode125_ablation_fixedfold
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: false
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  amp: true
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  non_blocking_transfers: false
  show_progress: false
  evaluation_interval: 8
  selection_interval: 8
  early_stopping_interval: 8
  final_epoch_evaluation: true
  final_selection_evaluation: true
  refresh_batch_outputs: true

automation:
  methods:
    - rcta_a_teacher_temporal
    - rcta_ab_gate
    - rcta_abc_proto_multi
  single_source_scenes:
    - mode1->mode2
    - mode2->mode1
    - mode1->mode5
    - mode5->mode1
    - mode2->mode5
    - mode5->mode2
  multisource_scenes:
    - mode1+mode2->mode5
    - mode1+mode5->mode2
    - mode2+mode5->mode1

protocol_override:
  setting: fixed_fold
  source_domains:
    - mode1
    - mode2
  target_domain: mode5
  random_fold_enabled: false
  preferred_fold: Fold 1
  source_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  target_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  fold_sampling:
    enabled: false
    strategy: fixed
    random_per_scene: false
    random_per_run: false
    source_fold_choices: [1, 2, 3, 4, 5]
    target_fold_choices: [1, 2, 3, 4, 5]
    note: "Mode1/2/5 ablation reuses the same fixed folds as the current smoke setup and benchmark fold policy."
  scene_fold_overrides:
    m1_m2:
      source_fold: 2
      target_fold: 4
    m2_m1:
      source_fold: 5
      target_fold: 3
    m1_m5:
      source_fold: 4
      target_fold: 3
    m5_m1:
      source_fold: 4
      target_fold: 4
    m2_m5:
      source_fold: 1
      target_fold: 3
    m5_m2:
      source_fold: 3
      target_fold: 4
    m1_2_m5:
      source_folds_by_domain:
        mode1: 4
        mode2: 1
      target_fold: 3
    m1_5_m2:
      source_folds_by_domain:
        mode1: 2
        mode5: 3
      target_fold: 4
    m2_5_m1:
      source_folds_by_domain:
        mode2: 4
        mode5: 4
      target_fold: 4

method_overrides:
  m1_m2:
    rcta_a_teacher_temporal:
      runtime_defaults:
        selection_weights:
          source_eval: 0.83
          target_confidence: 0.17
    rcta_ab_gate:
      loss:
        pseudo_label_weight: 0.035
        gate_accept_ratio_end: 0.44
    rcta_abc_proto_multi:

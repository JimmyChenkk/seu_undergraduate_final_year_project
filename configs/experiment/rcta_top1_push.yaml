experiment_name: rcta_top1_push
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: true
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  non_blocking_transfers: true
  show_progress: false
  model_selection: hybrid_source_eval_inverse_entropy
  early_stopping_metric: hybrid_source_eval_inverse_entropy
  selection_weights:
    source_eval: 0.75
    target_entropy: 0.25
  early_stopping_weights:
    source_eval: 0.75
    target_entropy: 0.25
  early_stopping_patience: 14
  early_stopping_min_delta: 0.001
  early_stopping_min_epochs: 24

automation:
  methods:
    - rcta
  single_source_scenes:
    - mode2->mode5
    - mode3->mode6
  multisource_targets: []

method_overrides:
  rcta:
    optimization:
      epochs: 80
    loss:
      base_align: dann
      teacher_temperature: 1.2
      reliability_weights:
        cal_conf: 1.4
        inv_entropy: 0.8
        consistency: 1.0
        proto_sim: 1.3
      gate_score_floor_start: 0.28
      gate_score_floor_end: 0.48
      gate_score_floor_schedule_steps: 2000
      gate_accept_ratio_start: 0.30
      gate_accept_ratio_end: 0.82
      gate_curriculum_steps: 2000
      pseudo_label_weight: 0.30
      pseudo_warmup_steps: 900
      pseudo_use_reliability_weighting: true
      prototype_weight: 0.04
      prototype_start_step: 1300
      prototype_warmup_steps: 1200
      consistency_weight: 0.06
      consistency_start_step: 900
      consistency_warmup_steps: 1200
      augment:
        weak_jitter_std: 0.005
        weak_scaling_std: 0.005
        strong_jitter_std: 0.012
        strong_scaling_std: 0.012
        strong_time_mask_ratio: 0.04
        strong_channel_dropout_prob: 0.04

notes:
  - TOP1 push: switch RCTA base alignment to DANN and strengthen reliability-aware pseudo training.
  - Focus only on mode2->mode5 and mode3->mode6 for fast feedback against current best baseline.

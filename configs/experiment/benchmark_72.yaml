experiment_name: benchmark_72
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: true
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  non_blocking_transfers: true
  show_progress: false
  model_selection: hybrid_source_eval_inverse_entropy
  early_stopping_metric: hybrid_source_eval_inverse_entropy
  selection_weights:
    source_eval: 0.7
    target_entropy: 0.3
  early_stopping_weights:
    source_eval: 0.7
    target_entropy: 0.3
  early_stopping_patience: 10
  early_stopping_min_delta: 0.002
  early_stopping_min_epochs: 20

automation:
  methods:
    - source_only
    - coral
    - dan
    - dann
    - cdan
    - deepjdot
  single_source_scenes:
    - mode1->mode4
    - mode4->mode1
    - mode2->mode5
    - mode5->mode2
    - mode3->mode6
    - mode6->mode3
  multisource_targets:
    - mode1
    - mode2
    - mode3
    - mode4
    - mode5
    - mode6

method_overrides:
  source_only: {}
  coral: {}
  dan: {}
  dann: {}
  cdan:
    runtime:
      model_selection: hybrid_source_eval_entropy_guard_domain_gap
      early_stopping_metric: hybrid_source_eval_entropy_guard_domain_gap
      selection_weights:
        source_eval: 1.0
        entropy_shortfall: 1.0
        domain_gap: 1.0
      selection_params:
        entropy_floor: 0.5
        domain_confusion_target: 0.5
      early_stopping_weights:
        source_eval: 1.0
        entropy_shortfall: 1.0
        domain_gap: 1.0
      early_stopping_params:
        entropy_floor: 0.5
        domain_confusion_target: 0.5
  deepjdot: {}

protocol_override:
  setting: single_source
  source_domains:
    - mode1
  target_domain: mode4
  preferred_fold: Fold 1

notes:
  - Benchmark config for the current phase.
  - Expands to 6 representative single-source settings plus 6 five-source-to-one-target settings.
  - The current benchmark narrative reports 12 settings x 6 methods = 72 runs.
  - CDAN currently opts into an entropy-guarded adversarial selection metric via method_overrides.

experiment_name: rescue_rpl_conservative
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: false
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  amp: true
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  non_blocking_transfers: false
  show_progress: false
  evaluation_interval: 5
  selection_interval: 5
  early_stopping_interval: 5
  final_epoch_evaluation: true
  final_selection_evaluation: true
  refresh_batch_outputs: true
  early_stopping_patience: 14
  early_stopping_min_delta: 0.0005
  early_stopping_min_epochs: 30

automation:
  methods:
    - source_only
    - target_only
    - cdan
    - tc_cdan
    - rpl_tc_cdan
    - ccs_rpl_tc_cdan
  single_source_scenes:
    - mode1->mode2
    - mode1->mode4

method_overrides:
  all:
    rpl_tc_cdan:
      runtime:
        model_selection: hybrid_source_eval_confidence_guard
        early_stopping_metric: hybrid_source_eval_confidence_guard
        selection_weights:
          source_eval: 0.86
          target_confidence: 0.14
          overconfidence: 0.85
        selection_params:
          confidence_ceiling: 0.90
        early_stopping_weights:
          source_eval: 0.86
          target_confidence: 0.14
          overconfidence: 0.85
        early_stopping_params:
          confidence_ceiling: 0.90
      loss:
        pseudo_weight: 0.03
        pseudo_start_step: 2200
        pseudo_warmup_steps: 1400
        pseudo_confidence_threshold: 0.95
        pseudo_entropy_threshold: 0.20
        pseudo_max_per_class: 2
    ccs_rpl_tc_cdan:
      runtime:
        model_selection: hybrid_source_eval_confidence_guard
        early_stopping_metric: hybrid_source_eval_confidence_guard
        selection_weights:
          source_eval: 0.86
          target_confidence: 0.14
          overconfidence: 0.90
        selection_params:
          confidence_ceiling: 0.90
        early_stopping_weights:
          source_eval: 0.86
          target_confidence: 0.14
          overconfidence: 0.90
        early_stopping_params:
          confidence_ceiling: 0.90
      loss:
        pseudo_weight: 0.025
        pseudo_start_step: 2200
        pseudo_warmup_steps: 1400
        pseudo_confidence_threshold: 0.95
        pseudo_entropy_threshold: 0.20
        pseudo_max_per_class: 2
        prototype_weight: 0.025
        prototype_start_step: 3000
        prototype_warmup_steps: 1200
        target_prototype_blend: 0.15
        class_separation_weight: 0.02

protocol_override:
  setting: single_source
  source_domains:
    - mode1
  target_domain: mode2
  random_fold_enabled: false
  preferred_fold: Fold 1
  source_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  target_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  fold_sampling:
    enabled: false
    strategy: fixed
    random_per_scene: false
    random_per_run: false
    source_fold_choices: [1, 2, 3, 4, 5]
    target_fold_choices: [1, 2, 3, 4, 5]
  scene_fold_overrides:
    m1_m2:
      source_fold: 2
      target_fold: 4
    m1_m4:
      source_fold: 3
      target_fold: 2

notes:
  - Conservative RPL/CCS mechanism probe before any large benchmark.
  - Keeps thesis method names unchanged; only experiment-level overrides delay and tighten pseudo-label use.
  - mode1->mode2 rechecks the smoke case; mode1->mode4 adds a 1/4/5 diagnostic transfer.
  - Target-Only uses configs/method/target_only.yaml runtime defaults with target_confidence selection.

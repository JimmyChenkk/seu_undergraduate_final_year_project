experiment_name: rcta_smoke_increment_debug
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: false
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  amp: true
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  non_blocking_transfers: false
  show_progress: false
  evaluation_interval: 8
  selection_interval: 8
  early_stopping_interval: 8
  final_epoch_evaluation: true
  final_selection_evaluation: true
  refresh_batch_outputs: true

automation:
  methods:
    - rcta_a_teacher_temporal
    - rcta_ab_gate
    - rcta_abc_proto_multi
  single_source_scenes:
    - mode1->mode2
  multisource_scenes:
    - mode1+mode2->mode5
  multisource_targets:
    - mode5

protocol_override:
  setting: fixed_fold
  source_domains:
    - mode1
    - mode2
  target_domain: mode5
  random_fold_enabled: false
  preferred_fold: Fold 1
  source_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  target_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  fold_sampling:
    enabled: false
    strategy: fixed
    random_per_scene: false
    random_per_run: false
    source_fold_choices: [1, 2, 3, 4, 5]
    target_fold_choices: [1, 2, 3, 4, 5]
    note: "Combined debug experiment for candidate-1 staged RCTA progression."
  scene_fold_overrides:
    m1_m2:
      source_fold: 2
      target_fold: 4
    m1_2_m5:
      source_folds_by_domain:
        mode1: 4
        mode2: 1
      target_fold: 3

method_overrides:
  m1_m2:
    rcta_a_teacher_temporal:
      runtime_defaults:
        selection_weights:
          source_eval: 0.82
          target_confidence: 0.18
    rcta_ab_gate:
      loss:
        pseudo_label_weight: 0.04
        gate_accept_ratio_end: 0.46
    rcta_abc_proto_multi:
      loss:
        pseudo_label_weight: 0.05
        prototype_weight: 0.10
  m1_2_m5:
    rcta_a_teacher_temporal:
      runtime_defaults:
        selection_weights:
          source_eval: 0.78
          target_confidence: 0.22
    rcta_ab_gate:
      loss:
        pseudo_label_weight: 0.02
        gate_accept_ratio_end: 0.40
    rcta_abc_proto_multi:
      loss:
        pseudo_label_weight: 0.03
        prototype_weight: 0.14
        target_prototype_blend_end: 0.60

notes:
  - Combined debug experiment for candidate-1 staged RCTA progression.
  - Single-source scene: mode1->mode2.
  - Multi-source scene: mode1+mode2->mode5.
  - Stage B is intentionally conservative to avoid noisy pseudo-label gain collapse.
  - Stage C is intentionally delayed and stronger, so the final gain should come from stable reliability and prototypes rather than from early overfitting.
  - Runs the same 3 cumulative RCTA stages on both scenes to check whether the increment trend generalizes.

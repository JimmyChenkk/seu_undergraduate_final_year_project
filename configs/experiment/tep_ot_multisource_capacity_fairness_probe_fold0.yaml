experiment_name: tep_ot_multisource_capacity_fairness_probe_fold0
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: true
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  amp: true
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  non_blocking_transfers: false
  show_progress: false
  evaluation_interval: 5
  selection_interval: 5
  early_stopping_interval: 5
  final_epoch_evaluation: true
  final_selection_evaluation: true
  target_eval_during_training: false
  refresh_batch_outputs: true
  early_stopping_patience:
  early_stopping_min_delta: 0.0
  early_stopping_min_epochs: 70

automation:
  methods:
    - codats_128
    - codats_500
    - pooled_wjdot_128
    - sourceaware_wjdot_128
    - sa_ccsr_wjdot_train_128
    - sa_ccsr_wjdot_train_500
  multisource_scenes:
    - mode1+mode5->mode2
    - mode1+mode2+mode4+mode5+mode6->mode3
    - mode1+mode2+mode3+mode4+mode6->mode5

protocol_override:
  setting: multi_source
  source_domains:
    - mode1
    - mode5
  target_domain: mode2
  random_fold_enabled: false
  preferred_fold: Fold 1
  source_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  target_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  fold_sampling:
    enabled: false
    strategy: fixed
    random_per_scene: false
    random_per_run: false
    source_fold_choices: [1, 2, 3, 4, 5]
    target_fold_choices: [1, 2, 3, 4, 5]

notes:
  - Capacity fairness probe for the three requested tasks.
  - Main fair comparison should use hidden dim 128 across methods; codats_500 is official-capacity context.

experiment_name: tep_ot_multisource_ccsr_wjdot_stage1_fold0
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: true
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  amp: true
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  non_blocking_transfers: false
  show_progress: false
  evaluation_interval: 5
  selection_interval: 5
  early_stopping_interval: 5
  final_epoch_evaluation: true
  final_selection_evaluation: true
  target_eval_during_training: false
  refresh_batch_outputs: true
  early_stopping_patience:
  early_stopping_min_delta: 0.0
  early_stopping_min_epochs: 70

automation:
  methods:
    - source_only
    - codats
    - wjdot
    - ccsr_wjdot_fusion
    - target_only
  multisource_scenes:
    - mode1+mode2->mode5
    - mode2+mode5->mode1
    - mode1+mode5->mode2
    - mode2+mode3+mode4+mode5+mode6->mode1
    - mode1+mode3+mode4+mode5+mode6->mode2
    - mode1+mode2+mode4+mode5+mode6->mode3
    - mode1+mode2+mode3+mode5+mode6->mode4
    - mode1+mode2+mode3+mode4+mode6->mode5
    - mode1+mode2+mode3+mode4+mode5->mode6

method_overrides:
  wjdot:
    optimization: &ot_optimization
      epochs: 70
      batch_size: 32
      learning_rate: 0.0001
      weight_decay: 0.0
      max_grad_norm: 5.0
  ccsr_wjdot_fusion:
    optimization: *ot_optimization

protocol_override:
  setting: multi_source
  source_domains:
    - mode1
    - mode2
  target_domain: mode5
  random_fold_enabled: false
  preferred_fold: Fold 1
  source_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  target_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  fold_sampling:
    enabled: false
    strategy: fixed
    random_per_scene: false
    random_per_run: false
    source_fold_choices: [1, 2, 3, 4, 5]
    target_fold_choices: [1, 2, 3, 4, 5]
    note: "Fold 0 in legacy CLI terms is represented here as Fold 1."

notes:
  - Stage 1 CCSR-WJDOT multi-source fold0 grid: 3 two-source tasks and 6 five-source leave-one-domain-out tasks.
  - target_only is included as a supervised target-domain reference, not as a UDA baseline.
  - In multi-source scenes target_only is not guaranteed to be an absolute upper bound, because source baselines can train on several labeled source domains.
  - Checkpoint selection remains target-eval-label-free; CCSR reliability uses unlabeled target-train samples.

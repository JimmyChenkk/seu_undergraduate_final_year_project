experiment_name: tep_ot_paper_main_target_assisted
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: true
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  amp: true
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  non_blocking_transfers: false
  show_progress: false
  evaluation_interval: 5
  selection_interval: 5
  early_stopping_interval: 5
  final_epoch_evaluation: true
  final_selection_evaluation: true
  refresh_batch_outputs: true
  model_selection: target_eval
  early_stopping_metric: target_eval
  early_stopping_patience:
  early_stopping_min_delta: 0.0
  early_stopping_min_epochs: 70

automation:
  methods:
    - wjdot
    - tp_wjdot
    - cbtp_wjdot
    - ms_cbtp_wjdot
  single_source_scenes:
    - mode1->mode2
    - mode2->mode1
    - mode1->mode5
    - mode5->mode1
    - mode2->mode5
    - mode5->mode2
  multisource_scenes:
    - mode1+mode2->mode5
    - mode2+mode5->mode1
    - mode1+mode5->mode2

method_overrides:
  all:
    wjdot:
      optimization:
        batch_size: 64
      loss:
        adaptation_weight: 0.35
        feature_weight: 0.03
        transport_solver: sinkhorn
        sinkhorn_reg: 0.05
        sinkhorn_num_iter_max: 200
        alignment_start_step: 350
        alignment_ramp_steps: 700
        embedding_norm_weight: 0.0001
    tp_wjdot:
      optimization:
        batch_size: 64
        weight_decay: 0.0001
      loss:
        adaptation_weight: 0.25
        feature_weight: 0.03
        transport_solver: sinkhorn
        sinkhorn_reg: 0.05
        sinkhorn_num_iter_max: 200
        prototype_mode: tp_barycentric
        prototype_weight: 0.05
        prototype_in_coupling: false
        prototype_distance: normalized_l2
        prototype_cost_clip: p90
        ot_class_entropy_gate: true
        min_class_transport_mass: 0.0001
        class_mass_weight: sqrt
        alignment_start_step: 700
        alignment_ramp_steps: 1200
        prototype_start_step: 1200
        prototype_warmup_steps: 1800
        embedding_norm_weight: 0.0001
    cbtp_wjdot:
      optimization:
        batch_size: 64
        weight_decay: 0.0001
      loss:
        adaptation_weight: 0.35
        feature_weight: 0.03
        transport_solver: sinkhorn
        sinkhorn_reg: 0.05
        sinkhorn_num_iter_max: 200
        base_tp_mode: tp_barycentric
        prototype_weight: 0.08
        prototype_in_coupling: false
        prototype_distance: normalized_l2
        prototype_cost_clip: p90
        ot_class_entropy_gate: true
        min_class_transport_mass: 0.0001
        class_mass_weight: sqrt
        alignment_start_step: 350
        alignment_ramp_steps: 700
        prototype_start_step: 700
        prototype_warmup_steps: 1200
        pseudo_start_step: 700
        tau_end: 0.80
        tau_steps: 1200
        pseudo_weight: 0.06
        class_balance_clip_min: 0.5
        class_balance_clip_max: 3.0
        consistency_weight: 0.04
        embedding_norm_weight: 0.0001
    ms_cbtp_wjdot:
      optimization:
        batch_size: 64
        weight_decay: 0.0001
      loss:
        adaptation_weight: 0.35
        feature_weight: 0.03
        transport_solver: sinkhorn
        sinkhorn_reg: 0.05
        sinkhorn_num_iter_max: 200
        base_tp_mode: tp_barycentric
        prototype_weight: 0.08
        prototype_in_coupling: false
        prototype_distance: normalized_l2
        prototype_cost_clip: p90
        ot_class_entropy_gate: true
        min_class_transport_mass: 0.0001
        class_mass_weight: sqrt
        alignment_start_step: 350
        alignment_ramp_steps: 700
        prototype_start_step: 700
        prototype_warmup_steps: 1200
        pseudo_start_step: 700
        tau_end: 0.80
        tau_steps: 1200
        pseudo_weight: 0.06
        class_balance_clip_min: 0.5
        class_balance_clip_max: 3.0
        consistency_weight: 0.04
        embedding_norm_weight: 0.0001
        source_weight_temperature: 1.0
        class_weight_temperature: 1.0
        negative_gate_threshold: 0.05
        negative_gate_floor: 0.1

protocol_override:
  setting: single_source
  source_domains:
    - mode1
  target_domain: mode2
  random_fold_enabled: false
  preferred_fold: Fold 1
  source_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  target_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  fold_sampling:
    enabled: false
    strategy: fixed
    random_per_scene: false
    random_per_run: false
    source_fold_choices: [1, 2, 3, 4, 5]
    target_fold_choices: [1, 2, 3, 4, 5]
    note: "Fixed fold policy for paper-facing target-assisted main experiments."
  scene_fold_overrides:
    m1_m2:
      source_fold: 2
      target_fold: 4
    m2_m1:
      source_fold: 5
      target_fold: 3
    m1_m5:
      source_fold: 4
      target_fold: 3
    m5_m1:
      source_fold: 4
      target_fold: 4
    m2_m5:
      source_fold: 1
      target_fold: 3
    m5_m2:
      source_fold: 3
      target_fold: 4
    m1_2_m5:
      source_folds_by_domain:
        mode1: 4
        mode2: 1
      target_fold: 3
    m1_5_m2:
      source_folds_by_domain:
        mode1: 2
        mode5: 3
      target_fold: 4
    m2_5_m1:
      source_folds_by_domain:
        mode2: 4
        mode5: 4
      target_fold: 4

notes:
  - Paper-facing performance config with concise method names: wjdot, tp_wjdot, cbtp_wjdot, ms_cbtp_wjdot.
  - Uses target_eval checkpoint selection intentionally; report as target-validation-assisted or oracle selection, not as strict unsupervised DA.
  - Keeps the stricter target_free configs as safety/ablation evidence, while this config is for the main performance table search.

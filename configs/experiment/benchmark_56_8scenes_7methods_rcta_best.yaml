experiment_name: benchmark_56_8scenes_7methods_rcta_best
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: true
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  non_blocking_transfers: true
  show_progress: false
  evaluation_interval: 5
  selection_interval: 5
  early_stopping_interval: 5
  final_epoch_evaluation: true
  final_selection_evaluation: true
  model_selection: hybrid_source_eval_target_confidence
  early_stopping_metric: hybrid_source_eval_target_confidence
  selection_weights:
    source_eval: 0.80
    target_confidence: 0.20
  early_stopping_weights:
    source_eval: 0.80
    target_confidence: 0.20
  early_stopping_patience: 14
  early_stopping_min_delta: 0.0005
  early_stopping_min_epochs: 28

automation:
  methods:
    - dan
    - deepjdot
    - rcta
    - dann
    - cdan
    # - dan
    - coral
    - source_only
  # multisource_scenes:
  #   - mode2-mode3-mode5->mode6
  #   - mode2-mode3-mode6->mode5
  #   - mode2-mode5-mode6->mode3
  #   - mode3-mode5-mode6->mode2
  single_source_scenes:
    - mode2->mode5
    - mode5->mode2
    - mode3->mode6
    - mode6->mode3

method_overrides:
  source_only:
    optimization:
      epochs: 84
  coral:
    optimization:
      epochs: 84
    loss:
      adapt_mean: true
      align_mean: true
      normalize_covariance: true
      adaptation_weight: 0.45
      adaptation_schedule: warm_start
      adaptation_max_steps: 1200
      adaptation_schedule_alpha: 10.0
  deepjdot:
    optimization:
      epochs: 84
    loss:
      adaptation_schedule: warm_start
      adaptation_weight: 0.45
      reg_dist: 0.20
      reg_cl: 1.00
      transport_solver: emd
      sinkhorn_reg: 0.2
      sinkhorn_num_iter_max: 400
      normalize_feature_cost: true
  dan:
    optimization:
      epochs: 84
    loss:
      adaptation_weight: 0.08
      adaptation_schedule: constant
      adaptation_max_steps: 1200
      adaptation_schedule_alpha: 10.0
      kernel_scales: [0.25, 0.5, 1.0, 2.0, 4.0]
      linear_mmd: false
  cdan:
    loss:
      adaptation_weight: 0.45
      adaptation_schedule: warm_start
      adaptation_max_steps: 1200
      adaptation_schedule_alpha: 10.0
      grl_lambda: 1.1
      grl_warm_start: true
      grl_max_iters: 1200
      randomized: true
      randomized_dim: 512
      entropy_conditioning: true
      mcc_weight: 0.06
      mcc_temperature: 2.0
      domain_hidden_dim: 384
      domain_num_hidden_layers: 3
    runtime:
      model_selection: hybrid_source_eval_target_confidence
      early_stopping_metric: hybrid_source_eval_target_confidence
      selection_weights:
        source_eval: 0.80
        target_confidence: 0.20
      early_stopping_weights:
        source_eval: 0.80
        target_confidence: 0.20
      early_stopping_patience: 14
      early_stopping_min_delta: 0.0005
      early_stopping_min_epochs: 28
  dann:
    optimization:
      epochs: 84
    loss:
      adaptation_weight: 0.40
      adaptation_schedule: warm_start
      adaptation_max_steps: 1200
      adaptation_schedule_alpha: 10.0
      grl_lambda: 0.8
      grl_warm_start: true
      grl_max_iters: 1200
      domain_hidden_dim: 256
      domain_num_hidden_layers: 2
  rcta:
    optimization:
      epochs: 84
    loss:
      base_align: cdan
      teacher_ema_decay: 0.995
      teacher_temperature: 1.3
      mcc_weight: 0.06
      reliability_weights:
        cal_conf: 1.1
        inv_entropy: 1.0
        consistency: 1.0
        proto_sim: 0.7
      gate_score_floor_start: 0.32
      gate_score_floor_end: 0.50
      gate_score_floor_schedule_steps: 1200
      gate_accept_ratio_start: 0.25
      gate_accept_ratio_end: 0.70
      gate_curriculum_steps: 1200
      pseudo_label_weight: 0.22
      pseudo_warmup_steps: 800
      pseudo_use_reliability_weighting: true
      pseudo_confidence_power: 1.2
      prototype_weight: 0.12
      prototype_start_step: 700
      prototype_warmup_steps: 800
      prototype_separation_weight: 0.10
      consistency_weight: 0.06
      consistency_start_step: 600
      consistency_warmup_steps: 800
      consistency_gate_only: true
      consistency_reliability_power: 1.0
      prototype_momentum: 0.95
      prototype_separation_margin: 0.20
      alignment_start_step: 600
      alignment_use_reliable_only: true
      cdan:
        adaptation_weight: 0.35
        adaptation_schedule: warm_start
        adaptation_max_steps: 1200
        adaptation_schedule_alpha: 10.0
        grl_lambda: 1.0
        grl_warm_start: true
        grl_max_iters: 1200
        randomized: true
        randomized_dim: 256
        entropy_conditioning: true
        domain_hidden_dim: 256
        domain_num_hidden_layers: 2
      dann:
        adaptation_weight: 0.45
        adaptation_schedule: warm_start
        adaptation_max_steps: 1200
        adaptation_schedule_alpha: 10.0
        grl_lambda: 1.0
        grl_warm_start: true
        grl_max_iters: 1200
        domain_hidden_dim: 256
        domain_num_hidden_layers: 2
      deepjdot:
        adaptation_weight: 0.45
        adaptation_schedule: warm_start
        adaptation_max_steps: 1200
        adaptation_schedule_alpha: 10.0
        reg_dist: 0.20
        reg_cl: 1.00
        normalize_feature_cost: true
        transport_solver: emd
        sinkhorn_reg: 0.2
        sinkhorn_num_iter_max: 400

notes:
  - Benchmark config for 7 methods across 8 scenarios on domains 2/3/5/6.
  - Single-source scenarios: 2->5, 5->2, 3->6, 6->3.
  - Multi-source scenarios: 235->6, 236->5, 256->3, 356->2.
  - RCTA is tuned more conservatively for better stability on 2->5 while keeping the strong TOP1-push style base.

experiment_name: benchmark_56_8scenes_7methods_rcta_best
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: true
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  non_blocking_transfers: true
  show_progress: false
  model_selection: hybrid_source_eval_inverse_entropy
  early_stopping_metric: hybrid_source_eval_inverse_entropy
  selection_weights:
    source_eval: 0.80
    target_entropy: 0.20
  early_stopping_weights:
    source_eval: 0.80
    target_entropy: 0.20
  early_stopping_patience: 18
  early_stopping_min_delta: 0.0008
  early_stopping_min_epochs: 30

automation:
  methods:
    - source_only
    - coral
    - deepjdot
    - dan
    - cdan
    - dann
    - rcta
  multisource_scenes:
    - mode2-mode3-mode5->mode6
    - mode2-mode3-mode6->mode5
    - mode2-mode5-mode6->mode3
    - mode3-mode5-mode6->mode2
  single_source_scenes:
    - mode2->mode5
    - mode5->mode2
    - mode3->mode6
    - mode6->mode3

method_overrides:
  source_only: {}
  coral: {}
  deepjdot: {}
  dan: {}
  cdan:
    runtime:
      model_selection: hybrid_source_eval_entropy_guard_domain_gap
      early_stopping_metric: hybrid_source_eval_entropy_guard_domain_gap
      selection_weights:
        source_eval: 1.0
        entropy_shortfall: 1.0
        domain_gap: 1.0
      selection_params:
        entropy_floor: 0.5
        domain_confusion_target: 0.5
      early_stopping_weights:
        source_eval: 1.0
        entropy_shortfall: 1.0
        domain_gap: 1.0
      early_stopping_params:
        entropy_floor: 0.5
        domain_confusion_target: 0.5
  dann: {}
  rcta:
    optimization:
      epochs: 96
    loss:
      base_align: dann
      teacher_temperature: 1.1
      reliability_weights:
        cal_conf: 1.6
        inv_entropy: 0.9
        consistency: 1.2
        proto_sim: 1.4
      gate_score_floor_start: 0.24
      gate_score_floor_end: 0.58
      gate_score_floor_schedule_steps: 2400
      gate_accept_ratio_start: 0.30
      gate_accept_ratio_end: 0.92
      gate_curriculum_steps: 2400
      pseudo_label_weight: 0.42
      pseudo_warmup_steps: 500
      pseudo_use_reliability_weighting: true
      pseudo_confidence_power: 1.60
      prototype_weight: 0.08
      prototype_start_step: 700
      prototype_warmup_steps: 1000
      consistency_weight: 0.12
      consistency_start_step: 500
      consistency_warmup_steps: 1000
      consistency_gate_only: true
      consistency_reliability_power: 1.8
      augment:
        weak_jitter_std: 0.005
        weak_scaling_std: 0.005
        strong_jitter_std: 0.014
        strong_scaling_std: 0.014
        strong_time_mask_ratio: 0.06
        strong_channel_dropout_prob: 0.05

notes:
  - Benchmark config for 7 methods across 8 scenarios on domains 2/3/5/6.
  - Single-source scenarios: 2->5, 5->2, 3->6, 6->3.
  - Multi-source scenarios: 235->6, 236->5, 256->3, 356->2.
  - RCTA is tuned more conservatively for better stability on 2->5 while keeping the strong TOP1-push style base.

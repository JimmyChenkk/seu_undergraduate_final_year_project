experiment_name: benchmark_56_8scenes_7methods_rcta_best
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: true
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  non_blocking_transfers: true
  show_progress: false
  model_selection: hybrid_source_eval_inverse_entropy
  early_stopping_metric: hybrid_source_eval_inverse_entropy
  selection_weights:
    source_eval: 0.80
    target_entropy: 0.20
  early_stopping_weights:
    source_eval: 0.80
    target_entropy: 0.20
  early_stopping_patience: 18
  early_stopping_min_delta: 0.0008
  early_stopping_min_epochs: 30

automation:
  methods:
    - deepjdot
    - rcta
    - dann
    - cdan
    - dan
    - coral
    - source_only
  multisource_scenes:
    - mode2-mode3-mode5->mode6
    - mode2-mode3-mode6->mode5
    - mode2-mode5-mode6->mode3
    - mode3-mode5-mode6->mode2
  single_source_scenes:
    - mode2->mode5
    - mode5->mode2
    - mode3->mode6
    - mode6->mode3

method_overrides:
  source_only: {}
  coral:
    loss:
      align_mean: false
      normalize_covariance: true
  deepjdot:
    loss:
      adaptation_schedule: warm_start
      transport_solver: sinkhorn
      sinkhorn_reg: 0.1
      sinkhorn_num_iter_max: 200
      normalize_feature_cost: true
  dan: {}
  cdan:
    runtime:
      model_selection: hybrid_source_eval_entropy_guard_domain_gap
      early_stopping_metric: hybrid_source_eval_entropy_guard_domain_gap
      selection_weights:
        source_eval: 1.0
        entropy_shortfall: 1.0
        domain_gap: 1.0
      selection_params:
        entropy_floor: 0.5
        domain_confusion_target: 0.5
      early_stopping_weights:
        source_eval: 1.0
        entropy_shortfall: 1.0
        domain_gap: 1.0
      early_stopping_params:
        entropy_floor: 0.5
        domain_confusion_target: 0.5
  dann: {}
  rcta:
    optimization:
      epochs: 96
    loss:
      base_align: cdan
      teacher_ema_decay: 0.995
      teacher_temperature: 1.3
      mcc_weight: 0.08
      reliability_weights:
        cal_conf: 1.2
        inv_entropy: 1.0
        consistency: 1.2
        proto_sim: 0.6
      gate_score_floor_start: 0.42
      gate_score_floor_end: 0.60
      gate_score_floor_schedule_steps: 1800
      gate_accept_ratio_start: 0.15
      gate_accept_ratio_end: 0.55
      gate_curriculum_steps: 1600
      pseudo_label_weight: 0.14
      pseudo_warmup_steps: 1500
      pseudo_use_reliability_weighting: true
      pseudo_confidence_power: 1.8
      prototype_weight: 0.08
      prototype_start_step: 1400
      prototype_warmup_steps: 1400
      prototype_separation_weight: 0.12
      consistency_weight: 0.04
      consistency_start_step: 1000
      consistency_warmup_steps: 1400
      consistency_gate_only: true
      consistency_reliability_power: 1.4
      prototype_momentum: 0.92
      prototype_separation_margin: 0.25
      cdan:
        adaptation_weight: 0.28
        adaptation_schedule: warm_start
        adaptation_max_steps: 1200
        adaptation_schedule_alpha: 10.0
        grl_lambda: 1.0
        grl_warm_start: true
        grl_max_iters: 1200
        randomized: true
        randomized_dim: 256
        entropy_conditioning: true
        domain_hidden_dim: 256
        domain_num_hidden_layers: 2
      dann:
        adaptation_weight: 0.40
        adaptation_schedule: warm_start
        adaptation_max_steps: 1200
        adaptation_schedule_alpha: 10.0
        grl_lambda: 1.0
        grl_warm_start: true
        grl_max_iters: 1200
        domain_hidden_dim: 256
        domain_num_hidden_layers: 2
      deepjdot:
        adaptation_weight: 0.60
        adaptation_schedule: warm_start
        adaptation_max_steps: 1200
        adaptation_schedule_alpha: 10.0
        reg_dist: 0.12
        reg_cl: 1.0
        normalize_feature_cost: true
        transport_solver: sinkhorn
        sinkhorn_reg: 0.05
        sinkhorn_num_iter_max: 100

notes:
  - Benchmark config for 7 methods across 8 scenarios on domains 2/3/5/6.
  - Single-source scenarios: 2->5, 5->2, 3->6, 6->3.
  - Multi-source scenarios: 235->6, 236->5, 256->3, 356->2.
  - RCTA is tuned more conservatively for better stability on 2->5 while keeping the strong TOP1-push style base.

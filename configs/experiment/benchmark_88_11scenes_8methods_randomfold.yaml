experiment_name: benchmark_88_11scenes_8methods_randomfold
# null/auto: generate a fresh seed once per benchmark launch, then reuse it
# inside that launch so all methods share the same sampled folds and run seed.
seed: null
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: true
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  non_blocking_transfers: false
  show_progress: false
  evaluation_interval: 5
  selection_interval: 5
  early_stopping_interval: 5
  final_epoch_evaluation: true
  final_selection_evaluation: true
  model_selection: hybrid_source_eval_target_confidence
  early_stopping_metric: hybrid_source_eval_target_confidence
  selection_weights:
    source_eval: 0.80
    target_confidence: 0.20
  early_stopping_weights:
    source_eval: 0.80
    target_confidence: 0.20
  early_stopping_patience: 14
  early_stopping_min_delta: 0.0005
  early_stopping_min_epochs: 28

automation:
  methods:
    - deepjdot
    - rcta
    - source_only
    - target_only
    - coral
    - dan
    - dann
    - cdan
  single_source_scenes:
    - mode3->mode6
    - mode6->mode3
    - mode1->mode4
    - mode1->mode5
    - mode4->mode5
    - mode4->mode1
    - mode5->mode1
    - mode5->mode4
  multisource_scenes:
    - mode1+mode4->mode5
    - mode1+mode5->mode4
    - mode4+mode5->mode1

method_overrides:
  source_only:
    optimization:
      epochs: 84
  target_only:
    optimization:
      epochs: 112
    runtime:
      model_selection: target_confidence
      early_stopping_metric: target_confidence
      early_stopping_patience: 18
      early_stopping_min_delta: 0.0005
      early_stopping_min_epochs: 35
  coral:
    optimization:
      epochs: 96
    loss:
      align_mean: true
      normalize_covariance: true
      adaptation_weight: 0.55
      adaptation_schedule: warm_start
      adaptation_max_steps: 1500
      adaptation_schedule_alpha: 10.0
  dan:
    optimization:
      epochs: 84
    loss:
      adaptation_weight: 0.08
      adaptation_schedule: constant
      adaptation_max_steps: 1200
      adaptation_schedule_alpha: 10.0
      kernel_scales: [0.25, 0.5, 1.0, 2.0, 4.0]
      linear_mmd: false
  dann:
    optimization:
      epochs: 84
    loss:
      adaptation_weight: 0.40
      adaptation_schedule: warm_start
      adaptation_max_steps: 1200
      adaptation_schedule_alpha: 10.0
      grl_lambda: 0.8
      grl_warm_start: true
      grl_max_iters: 1200
      domain_hidden_dim: 256
      domain_num_hidden_layers: 2
  cdan:
    optimization:
      epochs: 96
    loss:
      adaptation_weight: 0.35
      adaptation_schedule: warm_start
      adaptation_max_steps: 1500
      adaptation_schedule_alpha: 10.0
      grl_lambda: 0.9
      grl_warm_start: true
      grl_max_iters: 1500
      randomized: true
      randomized_dim: 512
      entropy_conditioning: true
      mcc_weight: 0.03
      mcc_temperature: 2.0
      domain_hidden_dim: 384
      domain_num_hidden_layers: 3
    runtime:
      model_selection: hybrid_source_eval_target_confidence
      early_stopping_metric: hybrid_source_eval_target_confidence
      selection_weights:
        source_eval: 0.80
        target_confidence: 0.20
      early_stopping_weights:
        source_eval: 0.80
        target_confidence: 0.20
      early_stopping_patience: 14
      early_stopping_min_delta: 0.0005
      early_stopping_min_epochs: 28
  deepjdot:
    optimization:
      epochs: 120
      batch_size: 64
      learning_rate: 0.0001
      weight_decay: 0.0
      max_grad_norm: 5.0
    runtime:
      model_selection: hybrid_source_eval_target_confidence
      early_stopping_metric: hybrid_source_eval_target_confidence
      selection_weights:
        source_eval: 0.60
        target_confidence: 0.40
      early_stopping_weights:
        source_eval: 0.60
        target_confidence: 0.40
      early_stopping_patience: 20
      early_stopping_min_delta: 0.0005
      early_stopping_min_epochs: 40
    loss:
      adaptation_schedule: warm_start
      adaptation_weight: 0.50
      adaptation_max_steps: 2200
      adaptation_schedule_alpha: 10.0
      reg_dist: 0.08
      reg_cl: 1.00
      transport_solver: emd
      sinkhorn_reg: 0.05
      sinkhorn_num_iter_max: 100
      normalize_feature_cost: false
  rcta:
    optimization:
      epochs: 96
    runtime:
      model_selection: hybrid_source_eval_confidence_guard
      early_stopping_metric: hybrid_source_eval_confidence_guard
      selection_weights:
        source_eval: 0.85
        target_confidence: 0.15
        overconfidence: 1.20
        domain_gap: 0.40
      selection_params:
        confidence_ceiling: 0.88
        domain_confusion_target: 0.50
        domain_gap_tolerance: 0.15
      early_stopping_weights:
        source_eval: 0.85
        target_confidence: 0.15
        overconfidence: 1.20
        domain_gap: 0.40
      early_stopping_params:
        confidence_ceiling: 0.88
        domain_confusion_target: 0.50
        domain_gap_tolerance: 0.15
      early_stopping_patience: 18
      early_stopping_min_delta: 0.0005
      early_stopping_min_epochs: 35
    loss:
      base_align: dann
      teacher_ema_decay: 0.990
      teacher_temperature: 1.6
      mcc_weight: 0.02
      reliability_weights:
        cal_conf: 0.8
        inv_entropy: 1.2
        consistency: 1.0
        proto_sim: 1.0
      gate_score_floor_start: 0.42
      gate_score_floor_end: 0.68
      gate_score_floor_schedule_steps: 1800
      gate_accept_ratio_start: 0.10
      gate_accept_ratio_end: 0.50
      gate_curriculum_steps: 1800
      reliable_score_floor: 0.70
      semi_reliable_score_floor: 0.48
      semi_reliable_consistency_weight: 0.02
      unreliable_entropy_weight: 0.00
      pseudo_label_weight: 0.08
      pseudo_warmup_steps: 1600
      pseudo_use_reliability_weighting: true
      pseudo_confidence_power: 1.6
      prototype_weight: 0.03
      prototype_start_step: 1000
      prototype_warmup_steps: 1500
      prototype_separation_weight: 0.05
      consistency_weight: 0.02
      consistency_start_step: 800
      consistency_warmup_steps: 1500
      consistency_gate_only: true
      consistency_reliability_power: 1.4
      prototype_momentum: 0.95
      prototype_separation_margin: 0.20
      alignment_start_step: 0
      alignment_use_reliable_only: false
      augment:
        weak_jitter_std: 0.004
        weak_scaling_std: 0.004
        strong_jitter_std: 0.010
        strong_scaling_std: 0.010
        strong_time_mask_ratio: 0.04
        strong_channel_dropout_prob: 0.04
      cdan:
        adaptation_weight: 0.35
        adaptation_schedule: warm_start
        adaptation_max_steps: 1200
        adaptation_schedule_alpha: 10.0
        grl_lambda: 1.0
        grl_warm_start: true
        grl_max_iters: 1200
        randomized: true
        randomized_dim: 256
        entropy_conditioning: true
        domain_hidden_dim: 256
        domain_num_hidden_layers: 2
      dann:
        adaptation_weight: 0.38
        adaptation_schedule: warm_start
        adaptation_max_steps: 1500
        adaptation_schedule_alpha: 10.0
        grl_lambda: 0.9
        grl_warm_start: true
        grl_max_iters: 1500
        domain_hidden_dim: 256
        domain_num_hidden_layers: 2
      deepjdot:
        adaptation_weight: 1.0
        adaptation_schedule: constant
        adaptation_max_steps: 1200
        adaptation_schedule_alpha: 10.0
        reg_dist: 0.10
        reg_cl: 1.00
        normalize_feature_cost: false
        transport_solver: emd
        sinkhorn_reg: 0.05
        sinkhorn_num_iter_max: 100

protocol_override:
  setting: random_fold
  source_domains:
    - mode3
  target_domain: mode6
  random_fold_enabled: true
  preferred_fold: Fold 1
  source_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  target_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  fold_sampling:
    strategy: random
    random_per_scene: true
    random_per_run: false
    source_fold_choices: [1, 2, 3, 4, 5]
    target_fold_choices: [1, 2, 3, 4, 5]
    note: "Random fold mode samples one source/target fold pair from {1,2,3,4,5} per scene and reuses it across methods."

notes:
  - 8 methods x 11 scenes = 88 runs.
  - 8 single-source scenes: 3->6, 6->3, 1->4, 1->5, 4->5, 4->1, 5->1, 5->4.
  - 3 multi-source-to-single scenes: 1&4->5, 1&5->4, 4&5->1.
  - Fold policy: do not pin Fold 1; auto-generate a seed per benchmark launch, sample one source/target fold pair from {1,2,3,4,5} per scene, and reuse it across methods.
  - DeepJDOT uses the best observed probe-v2 direction: lower OT weight, larger minibatch, longer warm start, and 0.60/0.40 source/target-confidence selection.
  - RCTA uses the goal-tune-v1 direction that gave the stronger 88-run average/ranking signal, while keeping guarded selection against overconfident target pseudo-labeling.
  - Speed probes favored num_workers=0 for this small TensorDataset workload; keep batch_size=64 only for DeepJDOT because global batch_size=64 changed optimization behavior in the short probe.

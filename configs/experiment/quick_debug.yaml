experiment_name: quick_debug
seed: 42
device: cuda
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: false
  save_analysis: false
  disable_cudnn: false
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  non_blocking_transfers: true
  show_progress: true
  progress_update_interval: 1
  evaluation_interval: 5
  selection_interval: 5
  early_stopping_interval: 5
  final_epoch_evaluation: true
  final_selection_evaluation: true
  model_selection: hybrid_source_eval_inverse_entropy
  early_stopping_metric: hybrid_source_eval_inverse_entropy
  selection_weights:
    source_eval: 0.7
    target_entropy: 0.3
  early_stopping_weights:
    source_eval: 0.7
    target_entropy: 0.3
  early_stopping_patience: 6
  early_stopping_min_delta: 0.002
  early_stopping_min_epochs: 10

automation:
  methods:
    - source_only
    - coral
    - dan
    - dann
    - cdan
    - deepjdot
  single_source_scenes:
    - mode1->mode4
    - mode4->mode1
  multisource_targets: []

method_overrides:
  source_only: {}
  coral: {}
  dan: {}
  dann: {}
  cdan:
    runtime:
      model_selection: hybrid_source_eval_entropy_guard_domain_gap
      early_stopping_metric: hybrid_source_eval_entropy_guard_domain_gap
      selection_weights:
        source_eval: 1.0
        entropy_shortfall: 1.0
        domain_gap: 1.0
      selection_params:
        entropy_floor: 0.5
        domain_confusion_target: 0.5
      early_stopping_weights:
        source_eval: 1.0
        entropy_shortfall: 1.0
        domain_gap: 1.0
      early_stopping_params:
        entropy_floor: 0.5
        domain_confusion_target: 0.5
  deepjdot: {}

protocol_override:
  setting: single_source
  source_domains:
    - mode1
  target_domain: mode4
  preferred_fold: Fold 1

notes:
  - Quick debug config for the current phase.
  - Expands to 2 representative single-source scenes x 6 methods = 12 runs.
  - Keep per-method tuning in method_overrides instead of hard-coding plans in automation code.
  - CDAN currently opts into an entropy-guarded adversarial selection metric via method_overrides.

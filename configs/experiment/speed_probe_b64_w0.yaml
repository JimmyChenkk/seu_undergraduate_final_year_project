experiment_name: speed_probe_b64_w0
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: false
  save_analysis: false
  disable_cudnn: false
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  non_blocking_transfers: false
  show_progress: false
  evaluation_interval: 4
  selection_interval: 4
  early_stopping_interval: 4
  final_epoch_evaluation: true
  final_selection_evaluation: false
  model_selection: hybrid_source_eval_target_confidence
  early_stopping_metric: hybrid_source_eval_target_confidence
  selection_weights:
    source_eval: 0.80
    target_confidence: 0.20
  early_stopping_weights:
    source_eval: 0.80
    target_confidence: 0.20

automation:
  methods:
    - dan
    - deepjdot
    - rcta
  single_source_scenes:
    - mode3->mode6
  multisource_scenes: []

method_overrides:
  "*":
    optimization:
      epochs: 8
      batch_size: 64

protocol_override:
  setting: single_source
  source_domains:
    - mode3
  target_domain: mode6
  random_fold_enabled: false
  preferred_fold: Fold 1

notes:
  - Speed probe combining in-process DataLoader iteration with a larger batch.
  - Batch-size changes can affect optimization, so use this as a throughput signal before touching final benchmark configs.

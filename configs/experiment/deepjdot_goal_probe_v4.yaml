experiment_name: deepjdot_goal_probe_v4
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: false
  save_analysis: false
  disable_cudnn: false
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  non_blocking_transfers: false
  show_progress: false
  evaluation_interval: 5
  selection_interval: 5
  early_stopping_interval: 5
  final_epoch_evaluation: true
  final_selection_evaluation: true
  model_selection: hybrid_source_eval_target_confidence
  early_stopping_metric: hybrid_source_eval_target_confidence
  selection_weights:
    source_eval: 0.65
    target_confidence: 0.35
  early_stopping_weights:
    source_eval: 0.65
    target_confidence: 0.35
  early_stopping_patience: 20
  early_stopping_min_delta: 0.0005
  early_stopping_min_epochs: 40

automation:
  methods:
    - deepjdot
  single_source_scenes:
    - mode3->mode6
    - mode6->mode3
    - mode1->mode4
    - mode1->mode5
    - mode4->mode5
    - mode4->mode1
    - mode5->mode1
    - mode5->mode4
  multisource_scenes:
    - mode1+mode4->mode5
    - mode1+mode5->mode4
    - mode4+mode5->mode1

method_overrides:
  deepjdot:
    optimization:
      epochs: 120
      batch_size: 64
      learning_rate: 0.0001
      weight_decay: 0.0
      max_grad_norm: 5.0
    loss:
      adaptation_schedule: warm_start
      adaptation_weight: 0.55
      adaptation_max_steps: 2200
      adaptation_schedule_alpha: 10.0
      reg_dist: 0.08
      reg_cl: 1.00
      transport_solver: emd
      sinkhorn_reg: 0.05
      sinkhorn_num_iter_max: 100
      normalize_feature_cost: false

protocol_override:
  setting: random_fold
  source_domains:
    - mode3
  target_domain: mode6
  random_fold_enabled: true
  preferred_fold: Fold 1
  source_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  target_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  fold_sampling:
    strategy: random
    random_per_scene: true
    random_per_run: false
    source_fold_choices: [1, 2, 3, 4, 5]
    target_fold_choices: [1, 2, 3, 4, 5]
    note: "Uses the same seed and scene order as benchmark_88 goal-tune for fold-comparable DeepJDOT probing."

notes:
  - DeepJDOT-only probe using the same 11-scene order and seed as benchmark_88 goal-tune.
  - Goal: keep the v2 stability gain while testing a mild OT lift after v3 regressed on mode5-related scenes.
  - Changes from v2: slightly higher OT weight and slightly more source-aware selection; keep reg_dist at the safer v2 value.

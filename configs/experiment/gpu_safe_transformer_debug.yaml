experiment_name: gpu_safe_transformer_debug
seed: 42
device: cuda
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: false
  save_analysis: true
  disable_cudnn: true
  cudnn_benchmark: false
  num_workers: 0
  pin_memory: false
  show_progress: false
  model_selection: best_source_eval
  early_stopping_metric: source_eval
  early_stopping_patience: 10
  early_stopping_min_delta: 0.002
  early_stopping_min_epochs: 20

protocol_override:
  setting: single_source
  source_domains:
    - mode1
  target_domain: mode2
  preferred_fold: Fold 1

notes:
  - Conservative Transformer debugging run with early stopping enabled.
  - Keeps the runtime on the safer GPU path while allowing up to 80 epochs when improvements continue.

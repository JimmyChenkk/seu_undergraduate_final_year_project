experiment_name: tep_ot_tp_safety_stage1
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: true
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  amp: true
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  non_blocking_transfers: false
  show_progress: false
  evaluation_interval: 5
  selection_interval: 5
  early_stopping_interval: 5
  final_epoch_evaluation: true
  final_selection_evaluation: true
  refresh_batch_outputs: true
  model_selection: target_free_checkpoint_guard
  early_stopping_metric: target_free_checkpoint_guard
  selection_weights:
    source_eval: 1.00
    target_entropy_badness: 0.10
    confidence_collapse: 1.00
    class_distribution_collapse: 0.50
    ot_cost_instability: 0.10
    embedding_norm_instability: 0.05
  selection_params:
    confidence_ceiling: 0.90
    target_entropy_floor: 0.15
    class_entropy_floor: 0.35
  early_stopping_weights:
    source_eval: 1.00
    target_entropy_badness: 0.10
    confidence_collapse: 1.00
    class_distribution_collapse: 0.50
    ot_cost_instability: 0.10
    embedding_norm_instability: 0.05
  early_stopping_params:
    confidence_ceiling: 0.90
    target_entropy_floor: 0.15
    class_entropy_floor: 0.35
  early_stopping_patience: 12
  early_stopping_min_delta: 0.0005
  early_stopping_min_epochs: 20

automation:
  methods:
    - wjdot
    - tp_residual_safe
    - tp_barycentric
    - cbtp_conservative
  single_source_scenes:
    - mode1->mode5
    - mode1->mode2
    - mode5->mode2
  multisource_scenes: []

method_overrides:
  tp_residual_safe:
    runtime:
      selection_params:
        confidence_ceiling: 0.66
        target_entropy_floor: 0.15
        class_entropy_floor: 0.35
      early_stopping_params:
        confidence_ceiling: 0.66
        target_entropy_floor: 0.15
        class_entropy_floor: 0.35
  tp_barycentric:
    runtime:
      selection_params:
        confidence_ceiling: 0.66
        target_entropy_floor: 0.15
        class_entropy_floor: 0.35
      early_stopping_params:
        confidence_ceiling: 0.66
        target_entropy_floor: 0.15
        class_entropy_floor: 0.35
  cbtp_conservative:
    runtime:
      selection_params:
        confidence_ceiling: 0.80
        target_entropy_floor: 0.15
        class_entropy_floor: 0.35
      early_stopping_params:
        confidence_ceiling: 0.80
        target_entropy_floor: 0.15
        class_entropy_floor: 0.35

protocol_override:
  setting: single_source
  source_domains:
    - mode1
  target_domain: mode5
  random_fold_enabled: false
  preferred_fold: Fold 1
  source_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  target_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  fold_sampling:
    enabled: false
    strategy: fixed
    random_per_scene: false
    random_per_run: false
    source_fold_choices: [1, 2, 3, 4, 5]
    target_fold_choices: [1, 2, 3, 4, 5]
  scene_fold_overrides:
    m1_m5:
      source_fold: 4
      target_fold: 3
    m1_m2:
      source_fold: 2
      target_fold: 4
    m5_m2:
      source_fold: 1
      target_fold: 4

notes:
  - Stage 1 sanity config for wjdot, tp_residual_safe, tp_barycentric, and cbtp_conservative.
  - Checkpoint selection is target-label-free and exports checkpoint_diagnostics.csv plus checkpoint_curve.png.


experiment_name: rcta_top1_push_four_pairs
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: true
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  non_blocking_transfers: true
  show_progress: false
  model_selection: hybrid_source_eval_inverse_entropy
  early_stopping_metric: hybrid_source_eval_inverse_entropy
  selection_weights:
    source_eval: 0.70
    target_entropy: 0.30
  early_stopping_weights:
    source_eval: 0.70
    target_entropy: 0.30
  early_stopping_patience: 16
  early_stopping_min_delta: 0.0008
  early_stopping_min_epochs: 28

automation:
  methods:
    - rcta
  single_source_scenes:
    - mode2->mode5
    - mode5->mode2
    - mode3->mode6
    - mode6->mode3
  multisource_targets: []

method_overrides:
  rcta:
    optimization:
      epochs: 96
    loss:
      base_align: dann
      teacher_temperature: 1.1
      reliability_weights:
        cal_conf: 1.6
        inv_entropy: 0.9
        consistency: 1.2
        proto_sim: 1.4
      gate_score_floor_start: 0.24
      gate_score_floor_end: 0.52
      gate_score_floor_schedule_steps: 2600
      gate_accept_ratio_start: 0.28
      gate_accept_ratio_end: 0.90
      gate_curriculum_steps: 2600
      pseudo_label_weight: 0.36
      pseudo_warmup_steps: 700
      pseudo_use_reliability_weighting: true
      prototype_weight: 0.06
      prototype_start_step: 1000
      prototype_warmup_steps: 1400
      consistency_weight: 0.08
      consistency_start_step: 700
      consistency_warmup_steps: 1400
      augment:
        weak_jitter_std: 0.005
        weak_scaling_std: 0.005
        strong_jitter_std: 0.014
        strong_scaling_std: 0.014
        strong_time_mask_ratio: 0.06
        strong_channel_dropout_prob: 0.05

notes:
  - Aggressive TOP1 push with DANN base alignment and stronger pseudo/prototype/consistency coupling.
  - Four cross-domain directions: 2->5, 5->2, 3->6, 6->3.
  - Targeting high transfer performance while keeping source_eval stable via hybrid selection.

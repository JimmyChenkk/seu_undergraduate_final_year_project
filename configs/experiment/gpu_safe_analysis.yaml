experiment_name: gpu_safe_analysis
seed: 42
device: cuda
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: false
  save_analysis: true
  disable_cudnn: true
  cudnn_benchmark: false
  num_workers: 0
  pin_memory: false
  show_progress: true
  progress_update_interval: 1

protocol_override:
  setting: single_source
  source_domains:
    - mode1
  target_domain: mode2
  preferred_fold: Fold 1

notes:
  - Conservative CUDA training config for iterative debugging under hybrid graphics mode.
  - Keeps analysis export enabled while leaving cuDNN and pinned-memory transfers disabled.

experiment_name: rescue_deepjdot_stability
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: true
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  amp: true
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  non_blocking_transfers: false
  show_progress: false
  evaluation_interval: 5
  selection_interval: 5
  early_stopping_interval: 5
  final_epoch_evaluation: true
  final_selection_evaluation: true
  refresh_batch_outputs: true
  model_selection: hybrid_source_eval_target_confidence
  early_stopping_metric: hybrid_source_eval_target_confidence
  selection_weights:
    source_eval: 0.70
    target_confidence: 0.30
  early_stopping_weights:
    source_eval: 0.70
    target_confidence: 0.30
  early_stopping_patience: 18
  early_stopping_min_delta: 0.0005
  early_stopping_min_epochs: 35

automation:
  methods:
    - source_only
    - cdan
    - deepjdot
  single_source_scenes:
    - mode1->mode2
    - mode1->mode5

method_overrides:
  deepjdot:
    optimization:
      batch_size: 64
      epochs: 120
      max_grad_norm: 5.0
    loss:
      adaptation_weight: 0.55
      adaptation_schedule: warm_start
      adaptation_max_steps: 2200
      reg_dist: 0.08
      reg_cl: 1.0
      normalize_feature_cost: true
      transport_solver: sinkhorn
      sinkhorn_reg: 0.05
      sinkhorn_num_iter_max: 200

protocol_override:
  setting: single_source
  source_domains:
    - mode1
  target_domain: mode2
  random_fold_enabled: false
  preferred_fold: Fold 1
  source_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  target_folds:
    - 1
    - 2
    - 3
    - 4
    - 5
  fold_sampling:
    enabled: false
    strategy: fixed
    random_per_scene: false
    random_per_run: false
    source_fold_choices: [1, 2, 3, 4, 5]
    target_fold_choices: [1, 2, 3, 4, 5]
  scene_fold_overrides:
    m1_m2:
      source_fold: 2
      target_fold: 4
    m1_m5:
      source_fold: 4
      target_fold: 3

notes:
  - Focused DeepJDOT stability probe with larger batch, warm-start adaptation, feature-cost normalization, and Sinkhorn.
  - Compare against Source-Only and CDAN before deciding whether DeepJDOT is an implementation issue or a task/parameter sensitivity issue.

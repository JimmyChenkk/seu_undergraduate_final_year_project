experiment_name: rcta_hybrid_balanced_probe
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: true
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  non_blocking_transfers: false
  show_progress: false
  evaluation_interval: 5
  selection_interval: 5
  early_stopping_interval: 5
  final_epoch_evaluation: true
  final_selection_evaluation: true
  model_selection: hybrid_source_eval_confidence_guard
  early_stopping_metric: hybrid_source_eval_confidence_guard
  selection_weights:
    source_eval: 0.80
    target_confidence: 0.20
    overconfidence: 1.00
    domain_gap: 0.25
  selection_params:
    confidence_ceiling: 0.90
    domain_confusion_target: 0.50
    domain_gap_tolerance: 0.18
  early_stopping_weights:
    source_eval: 0.80
    target_confidence: 0.20
    overconfidence: 1.00
    domain_gap: 0.25
  early_stopping_params:
    confidence_ceiling: 0.90
    domain_confusion_target: 0.50
    domain_gap_tolerance: 0.18
  early_stopping_patience: 20
  early_stopping_min_delta: 0.0005
  early_stopping_min_epochs: 40

automation:
  methods:
    - rcta
  single_source_scenes:
    - mode3->mode6
    - mode1->mode2
    - mode2->mode1
    - mode2->mode5
    - mode5->mode2
  multisource_scenes:
    - mode1+mode2->mode5
    - mode1+mode5->mode2
    - mode2+mode5->mode1

method_overrides:
  rcta:
    optimization:
      epochs: 112
    loss:
      base_align: hybrid
      hybrid_aligners: [dann, cdan, dan]
      hybrid_alignment_weights:
        dann: 0.20
        cdan: 0.45
        dan: 0.35
      gate_balance_mode: class_balanced_budget
      gate_max_class_fraction: 0.34
      target_prototype_update_mode: gated
      target_prototype_blend_start: 0.0
      target_prototype_blend_end: 0.75
      target_prototype_blend_schedule_steps: 1800
      multi_source_weighting: true
      source_weight_temperature: 4.0
      source_weight_momentum: 0.30
      source_weight_floor: 0.05
      source_weight_proto: 1.0
      source_weight_confidence: 0.15
      teacher_ema_decay: 0.992
      teacher_temperature: 1.3
      mcc_weight: 0.04
      reliability_weights:
        cal_conf: 1.1
        inv_entropy: 1.0
        consistency: 1.1
        proto_sim: 1.2
      gate_score_floor_start: 0.34
      gate_score_floor_end: 0.56
      gate_score_floor_schedule_steps: 2200
      gate_accept_ratio_start: 0.22
      gate_accept_ratio_end: 0.72
      gate_curriculum_steps: 2200
      reliable_score_floor: 0.66
      semi_reliable_score_floor: 0.44
      semi_reliable_consistency_weight: 0.04
      unreliable_entropy_weight: 0.01
      pseudo_label_weight: 0.22
      pseudo_warmup_steps: 900
      pseudo_use_reliability_weighting: true
      pseudo_confidence_power: 1.4
      prototype_weight: 0.07
      prototype_start_step: 800
      prototype_warmup_steps: 1200
      prototype_separation_weight: 0.08
      consistency_weight: 0.06
      consistency_start_step: 700
      consistency_warmup_steps: 1200
      consistency_gate_only: true
      consistency_reliability_power: 1.4
      prototype_momentum: 0.95
      prototype_separation_margin: 0.20
      alignment_start_step: 0
      alignment_use_reliable_only: false
      cdan:
        adaptation_weight: 0.35
        adaptation_schedule: warm_start
        adaptation_max_steps: 1200
        adaptation_schedule_alpha: 10.0
        grl_lambda: 1.0
        grl_warm_start: true
        grl_max_iters: 1200
        randomized: true
        randomized_dim: 256
        entropy_conditioning: true
        domain_hidden_dim: 256
        domain_num_hidden_layers: 2
      dann:
        adaptation_weight: 0.42
        adaptation_schedule: warm_start
        adaptation_max_steps: 1800
        adaptation_schedule_alpha: 10.0
        grl_lambda: 0.95
        grl_warm_start: true
        grl_max_iters: 1800
        domain_hidden_dim: 256
        domain_num_hidden_layers: 2
      dan:
        adaptation_weight: 0.08
        adaptation_schedule: warm_start
        adaptation_max_steps: 1200
        adaptation_schedule_alpha: 10.0
        kernel_scales: [0.25, 0.5, 1.0, 2.0, 4.0]
        linear_mmd: false

protocol_override:
  setting: fixed_fold
  source_domains:
    - mode3
  target_domain: mode6
  random_fold_enabled: false
  preferred_fold: Fold 1
  source_folds: [1, 2, 3, 4, 5]
  target_folds: [1, 2, 3, 4, 5]
  fold_sampling:
    enabled: false
    strategy: fixed
    random_per_scene: false
    random_per_run: false
    source_fold_choices: [1, 2, 3, 4, 5]
    target_fold_choices: [1, 2, 3, 4, 5]
  scene_fold_overrides:
    m3_m6:
      source_fold: 1
      target_fold: 1
    m1_m2:
      source_fold: 2
      target_fold: 4
    m2_m1:
      source_fold: 5
      target_fold: 3
    m2_m5:
      source_fold: 1
      target_fold: 3
    m5_m2:
      source_fold: 3
      target_fold: 4
    m1_2_m5:
      source_folds_by_domain:
        mode1: 4
        mode2: 1
      target_fold: 3
    m1_5_m2:
      source_folds_by_domain:
        mode1: 2
        mode5: 3
      target_fold: 4
    m2_5_m1:
      source_folds_by_domain:
        mode2: 4
        mode5: 4
      target_fold: 4

notes:
  - RCTA-only probe for improving the three weak fixed-fold scenes while protecting two strong sentinel scenes.
  - Enables hybrid DANN/CDAN/DAN alignment, class-balanced target gating, gated target prototype updates, and multi-source reliability weighting.

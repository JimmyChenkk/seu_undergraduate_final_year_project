experiment_name: autonomous_small_scale
seed: 42
device: cuda
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: false
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: false
  num_workers: 0
  pin_memory: false

protocol_override:
  setting: single_source
  source_domains:
    - mode1
  target_domain: mode4
  preferred_fold: Fold 1

notes:
  - Default small-scale config for the autonomous 3-round workflow.
  - The batch runner overrides source and target domains per scene.
  - Keeps CUDA transfers conservative unless a probe config explicitly opts into aggressive settings.

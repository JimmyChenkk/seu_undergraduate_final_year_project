experiment_name: full_36_fcn_aggressive_5090
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: false
  save_analysis: false
  disable_cudnn: false
  cudnn_benchmark: true
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  non_blocking_transfers: true
  show_progress: false
  model_selection: best_source_eval
  early_stopping_metric: source_eval
  early_stopping_patience: 10
  early_stopping_min_delta: 0.002
  early_stopping_min_epochs: 20

protocol_override:
  setting: single_source
  source_domains:
    - mode1
  target_domain: mode2
  preferred_fold: Fold 1

notes:
  - Full FCN benchmark config for 30 directed single-source scenes plus 6 five-source-to-one-target scenes.
  - Targets the local RTX 5090 on cuda:0 with cuDNN, cuDNN benchmark, pin_memory, persistent workers, and non-blocking transfers enabled.
  - Disables per-run analysis export so the long round focuses on comparable benchmark metrics first.

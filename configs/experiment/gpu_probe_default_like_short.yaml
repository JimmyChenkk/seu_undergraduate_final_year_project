experiment_name: gpu_probe_default_like_short
seed: 42
device: cuda
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: true
  save_checkpoint: false
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  num_workers: 0
  pin_memory: true
  eval_max_batches: 1
  analysis_max_batches: 1

protocol_override:
  setting: single_source
  source_domains:
    - mode1
  target_domain: mode2
  preferred_fold: Fold 1

notes:
  - Short default-like GPU probe with cuDNN, pinned memory, and analysis export enabled.
  - Keeps the run conservative with dry_run and one-batch evaluation and analysis limits.

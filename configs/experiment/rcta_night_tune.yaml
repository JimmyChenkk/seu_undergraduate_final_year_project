experiment_name: rcta_night_tune
seed: 42
device: cuda:0
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: true
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: true
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  non_blocking_transfers: true
  show_progress: false
  model_selection: hybrid_source_eval_entropy_guard_domain_gap
  early_stopping_metric: hybrid_source_eval_entropy_guard_domain_gap
  selection_weights:
    source_eval: 1.0
    entropy_shortfall: 2.0
    domain_gap: 1.0
  selection_params:
    entropy_floor: 0.5
    domain_confusion_target: 0.5
  early_stopping_weights:
    source_eval: 1.0
    entropy_shortfall: 2.0
    domain_gap: 1.0
  early_stopping_params:
    entropy_floor: 0.5
    domain_confusion_target: 0.5
  early_stopping_patience: 12
  early_stopping_min_delta: 0.001
  early_stopping_min_epochs: 20

automation:
  methods:
    - rcta
  single_source_scenes:
    - mode2->mode5
    - mode3->mode6
  multisource_targets: []

method_overrides:
  rcta:
    loss:
      base_align: cdan
      use_mcc: false
      teacher_temperature: 1.1
      reliability_weights:
        cal_conf: 1.2
        inv_entropy: 0.6
        consistency: 1.0
        proto_sim: 1.2
      gate_score_floor_start: 0.25
      gate_score_floor_end: 0.45
      gate_score_floor_schedule_steps: 1800
      gate_accept_ratio_start: 0.25
      gate_accept_ratio_end: 0.70
      gate_curriculum_steps: 1800
      pseudo_label_weight: 0.25
      pseudo_warmup_steps: 800
      prototype_weight: 0.05
      prototype_start_step: 1200
      prototype_warmup_steps: 1200
      consistency_weight: 0.05
      consistency_start_step: 800
      consistency_warmup_steps: 1200
      augment:
        weak_jitter_std: 0.005
        weak_scaling_std: 0.005
        strong_jitter_std: 0.015
        strong_scaling_std: 0.015
        strong_time_mask_ratio: 0.05
        strong_channel_dropout_prob: 0.05

notes:
  - Night tuning config for RCTA on the two primary single-source scenarios.
  - Uses a CDAN alignment base close to the original easy-pairs setup, with weaker augmentations and entropy-collapse guarding during selection.

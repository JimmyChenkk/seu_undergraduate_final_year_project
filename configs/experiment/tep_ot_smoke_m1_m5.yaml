experiment_name: tep_ot_smoke_m1_m5
seed: 0
device: cpu
output_dir: runs

tracking:
  batch_root_name: tep_ot_smoke_m1_m5

runtime:
  dry_run: true
  save_checkpoint: true
  save_analysis: true
  amp: false
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  non_blocking_transfers: false
  show_progress: false
  evaluation_interval: 1
  selection_interval: 1
  early_stopping_interval: 1
  final_epoch_evaluation: true
  final_selection_evaluation: true
  refresh_batch_outputs: false
  model_selection: source_eval

method_overrides:
  all:
    ms_cbtp_wjdot:
      optimization:
        epochs: 1
        batch_size: 16
        learning_rate: 0.0001
      loss:
        sinkhorn_num_iter_max: 20
        alignment_start_step: 0
        alignment_ramp_steps: 1
        pseudo_start_step: 0
        tau_steps: 10
    cbtp_wjdot:
      optimization:
        epochs: 1
        batch_size: 16
        learning_rate: 0.0001
      loss:
        sinkhorn_num_iter_max: 20
        alignment_start_step: 0
        alignment_ramp_steps: 1
        pseudo_start_step: 0
        tau_steps: 10
    tp_wjdot:
      optimization:
        epochs: 1
        batch_size: 16
        learning_rate: 0.0001
      loss:
        sinkhorn_num_iter_max: 20
        alignment_start_step: 0
        alignment_ramp_steps: 1
        prototype_start_step: 0
        prototype_warmup_steps: 1
        prototype_confidence_threshold: 0.0
    wjdot:
      optimization:
        epochs: 1
        batch_size: 16
        learning_rate: 0.0001
      loss:
        sinkhorn_num_iter_max: 20
        alignment_start_step: 0
        alignment_ramp_steps: 1

protocol_override:
  setting: single_source
  source_domains:
    - mode1
  target_domain: mode5
  random_fold_enabled: false
  preferred_fold: Fold 1
  fold_sampling:
    enabled: false
    strategy: fixed
    random_per_scene: false
    random_per_run: false

notes:
  - Original-framework smoke test for m1->m5 Fold 1.

experiment_name: gpu_probe_analysis_only
seed: 42
device: cuda
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: true
  save_checkpoint: false
  save_analysis: true
  disable_cudnn: true
  num_workers: 0
  pin_memory: false
  eval_max_batches: 1
  analysis_max_batches: 1

protocol_override:
  setting: single_source
  source_domains:
    - mode1
  target_domain: mode2
  preferred_fold: Fold 1

notes:
  - Conservative probe with post-training analysis export enabled.
  - Caps evaluation and analysis collection to one batch each.

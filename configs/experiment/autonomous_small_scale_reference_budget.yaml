experiment_name: autonomous_small_scale_reference_budget
seed: 42
device: cuda
output_dir: runs

tracking:
  batch_root_name:

runtime:
  dry_run: false
  save_checkpoint: false
  save_analysis: true
  disable_cudnn: false
  cudnn_benchmark: false
  num_workers: 0
  pin_memory: false

method_override:
  optimization:
    epochs: 70
    learning_rate: 0.0001

protocol_override:
  setting: single_source
  source_domains:
    - mode1
  target_domain: mode4
  preferred_fold: Fold 1

notes:
  - Reference-aligned training budget based on the local tep-domain-adaptation examples.
  - Keeps the same runtime safety defaults while increasing the optimization horizon substantially.

method_name: rcta
method_display_name: rcta_abc_proto_multi

backbone:
  name: fcn
  classifier_hidden_dim: 128
  dropout: 0.1

optimization:
  epochs: 112
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0
  max_grad_norm: 5.0

runtime_defaults:
  model_selection: hybrid_source_eval_target_confidence
  early_stopping_metric: hybrid_source_eval_target_confidence
  selection_weights:
    source_eval: 0.80
    target_confidence: 0.20
  early_stopping_weights:
    source_eval: 0.80
    target_confidence: 0.20
  early_stopping_patience: 16
  early_stopping_min_delta: 0.0005
  early_stopping_min_epochs: 36

loss:
  base_align: hybrid
  hybrid_aligners: [dann, cdan, dan]
  hybrid_alignment_weights:
    dann: 0.20
    cdan: 0.35
    dan: 0.45
  use_mcc: true
  mcc_weight: 0.04
  mcc_temperature: 2.0
  teacher_ema_decay: 0.992
  teacher_temperature: 1.3
  reliability_weights:
    cal_conf: 1.15
    inv_entropy: 1.0
    consistency: 1.15
    proto_sim: 0.95
  gate_score_floor_start: 0.42
  gate_score_floor_end: 0.58
  gate_score_floor_schedule_steps: 2000
  gate_accept_ratio_start: 0.60
  gate_accept_ratio_end: 0.82
  gate_curriculum_steps: 2000
  gate_balance_mode: per_class_ratio
  gate_max_class_fraction: 1.0
  reliable_score_floor: 0.64
  semi_reliable_score_floor: 0.40
  semi_reliable_consistency_weight: 0.06
  unreliable_entropy_weight: 0.02
  pseudo_label_weight: 0.16
  pseudo_warmup_steps: 700
  pseudo_use_reliability_weighting: true
  pseudo_confidence_power: 1.15
  prototype_weight: 0.08
  prototype_start_step: 700
  prototype_warmup_steps: 1200
  prototype_separation_weight: 0.10
  consistency_weight: 0.09
  consistency_start_step: 0
  consistency_warmup_steps: 0
  consistency_gate_only: true
  consistency_reliability_power: 1.25
  alignment_start_step: 0
  alignment_use_reliable_only: false
  prototype_momentum: 0.95
  prototype_separation_margin: 0.20
  target_prototype_update_mode: gated
  target_prototype_blend_start: 0.0
  target_prototype_blend_end: 0.50
  target_prototype_blend_schedule_steps: 1800
  multi_source_weighting: true
  source_weight_temperature: 3.0
  source_weight_momentum: 0.20
  source_weight_floor: 0.08
  source_weight_proto: 1.0
  source_weight_confidence: 0.10
  source_weight_coverage: 0.25
  augment:
    weak_jitter_std: 0.005
    weak_scaling_std: 0.005
    strong_jitter_std: 0.012
    strong_scaling_std: 0.012
    strong_time_mask_ratio: 0.05
    strong_channel_dropout_prob: 0.05
  cdan:
    adaptation_weight: 0.35
    adaptation_schedule: warm_start
    adaptation_max_steps: 1200
    adaptation_schedule_alpha: 10.0
    grl_lambda: 1.0
    grl_warm_start: true
    grl_max_iters: 1200
    randomized: true
    randomized_dim: 256
    entropy_conditioning: true
    domain_hidden_dim: 256
    domain_num_hidden_layers: 2
  dann:
    adaptation_weight: 0.42
    adaptation_schedule: warm_start
    adaptation_max_steps: 1800
    adaptation_schedule_alpha: 10.0
    grl_lambda: 0.95
    grl_warm_start: true
    grl_max_iters: 1800
    domain_hidden_dim: 256
    domain_num_hidden_layers: 2
  dan:
    adaptation_weight: 0.12
    adaptation_schedule: warm_start
    adaptation_max_steps: 1200
    adaptation_schedule_alpha: 10.0
    kernel_scales: [0.25, 0.5, 1.0, 2.0, 4.0]
    linear_mmd: false

notes:
  - Stage A+B+C: teacher stability, reliability gate, prototypes, and multi-source weighting.
  - This is the full candidate-1 complete method row.

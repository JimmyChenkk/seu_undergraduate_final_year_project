method_name: rcta
method_display_name: rcta_a_teacher_temporal

backbone:
  name: fcn
  classifier_hidden_dim: 128
  dropout: 0.1

optimization:
  epochs: 112
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0
  max_grad_norm: 5.0

runtime_defaults:
  model_selection: hybrid_source_eval_target_confidence
  early_stopping_metric: hybrid_source_eval_target_confidence
  selection_weights:
    source_eval: 0.84
    target_confidence: 0.16
  early_stopping_weights:
    source_eval: 0.84
    target_confidence: 0.16
  early_stopping_patience: 16
  early_stopping_min_delta: 0.0004
  early_stopping_min_epochs: 30

loss:
  base_align: hybrid
  hybrid_aligners: [dann, cdan, dan]
  hybrid_alignment_weights:
    dann: 0.24
    cdan: 0.36
    dan: 0.40
  use_mcc: true
  mcc_weight: 0.03
  mcc_temperature: 2.0
  teacher_ema_decay: 0.994
  teacher_temperature: 1.25
  reliability_weights:
    cal_conf: 1.0
    inv_entropy: 1.0
    consistency: 1.0
    proto_sim: 0.0
  gate_score_floor_start: 0.50
  gate_score_floor_end: 0.50
  gate_score_floor_schedule_steps: 1
  gate_accept_ratio_start: 1.0
  gate_accept_ratio_end: 1.0
  gate_curriculum_steps: 1
  gate_balance_mode: per_class_ratio
  gate_max_class_fraction: 1.0
  reliable_score_floor: 0.60
  semi_reliable_score_floor: 0.44
  semi_reliable_consistency_weight: 0.0
  unreliable_entropy_weight: 0.0
  pseudo_label_weight: 0.0
  pseudo_warmup_steps: 0
  pseudo_use_reliability_weighting: true
  pseudo_confidence_power: 1.0
  prototype_weight: 0.0
  prototype_start_step: 0
  prototype_warmup_steps: 0
  prototype_separation_weight: 0.0
  consistency_weight: 0.10
  consistency_start_step: 0
  consistency_warmup_steps: 0
  consistency_gate_only: false
  consistency_reliability_power: 0.0
  alignment_start_step: 0
  alignment_use_reliable_only: false
  prototype_momentum: 0.95
  prototype_separation_margin: 0.20
  target_prototype_update_mode: gated
  target_prototype_blend_start: 0.0
  target_prototype_blend_end: 0.0
  target_prototype_blend_schedule_steps: 1
  multi_source_weighting: false
  source_weight_temperature: 4.0
  source_weight_momentum: 0.0
  source_weight_floor: 0.0
  source_weight_proto: 1.0
  source_weight_confidence: 0.0
  source_weight_coverage: 0.0
  augment:
    weak_jitter_std: 0.005
    weak_scaling_std: 0.005
    strong_jitter_std: 0.012
    strong_scaling_std: 0.012
    strong_time_mask_ratio: 0.05
    strong_channel_dropout_prob: 0.05
  cdan:
    adaptation_weight: 0.35
    adaptation_schedule: warm_start
    adaptation_max_steps: 1200
    adaptation_schedule_alpha: 10.0
    grl_lambda: 1.0
    grl_warm_start: true
    grl_max_iters: 1200
    randomized: true
    randomized_dim: 256
    entropy_conditioning: true
    domain_hidden_dim: 256
    domain_num_hidden_layers: 2
  dann:
    adaptation_weight: 0.42
    adaptation_schedule: warm_start
    adaptation_max_steps: 1800
    adaptation_schedule_alpha: 10.0
    grl_lambda: 0.95
    grl_warm_start: true
    grl_max_iters: 1800
    domain_hidden_dim: 256
    domain_num_hidden_layers: 2
  dan:
    adaptation_weight: 0.12
    adaptation_schedule: warm_start
    adaptation_max_steps: 1200
    adaptation_schedule_alpha: 10.0
    kernel_scales: [0.25, 0.5, 1.0, 2.0, 4.0]
    linear_mmd: false

notes:
  - Stage A: only the teacher-student temporal stabilizer is active.
  - This stage is intentionally conservative and should mainly establish a stable migration start.
  - No reliability gate, no pseudo-label supervision, no prototypes, no multi-source weighting.

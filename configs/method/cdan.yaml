method_name: cdan

backbone:
  name: fcn
  classifier_hidden_dim: 128
  dropout: 0.1

optimization:
  epochs: 70
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0
  max_grad_norm: 5.0

loss:
  name: conditional_domain_adversarial
  adaptation_weight: 0.2
  adaptation_schedule: warm_start
  adaptation_max_steps: 1000
  adaptation_schedule_alpha: 10.0
  grl_lambda: 1.0
  grl_warm_start: true
  grl_max_iters: 1000
  randomized: true
  randomized_dim: 256
  entropy_conditioning: true
  domain_hidden_dim: 256
  domain_num_hidden_layers: 2

notes:
  - CDAN baseline with randomized multilinear conditioning, entropy weighting, and warm-start GRL.
  - Uses a slightly stronger adaptation weight for the TEP 29-class setting.

method_name: source_only

backbone:
  name: transformer
  classifier_hidden_dim: 0
  dropout: 0.1
  head_dim: 16
  nhead: 8
  dim_feedforward: 256
  num_layers: 6
  reduction: last

optimization:
  epochs: 80
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0

loss:
  name: cross_entropy

notes:
  - First mainline Transformer source-only debug config adapted from the public notebook prototype.
  - Uses a direct linear classifier so the backbone comparison stays as fair as possible against the improved FCN baseline.

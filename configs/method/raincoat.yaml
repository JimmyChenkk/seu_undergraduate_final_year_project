method_name: raincoat

backbone:
  name: raincoat
  dropout: 0.1
  fourier_modes: 64
  mid_channels: 64
  final_out_channels: 128
  kernel_size: 5
  stride: 1
  features_len: 1

optimization:
  epochs: 70
  batch_size: 32
  learning_rate: 0.0005
  weight_decay: 0.0
  max_grad_norm: 5.0

loss:
  name: raincoat_time_frequency_sinkhorn
  classifier_temperature: 0.1
  sinkhorn_weight: 0.5
  reconstruction_weight: 0.0001
  reconstruction_reduction: mean
  sinkhorn_epsilon: 0.05
  sinkhorn_max_iter: 50
  sinkhorn_threshold: 0.001

notes:
  - RAINCOAT baseline adapted from the official reference: time-frequency encoder, reconstruction decoder, and Sinkhorn feature alignment.
  - Sinkhorn iterations are capped for mode125 throughput while preserving the differentiable OT objective.

  adaptation_weight: 1.0
  reg_dist: 0.1
  reg_cl: 1.0

notes:
  - Reference-aligned DeepJDOT config for the long full-method round.
  - Reuses the simplified classifier head to isolate OT behavior from avoidable source-side regularization.

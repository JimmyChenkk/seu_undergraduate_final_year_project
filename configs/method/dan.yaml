method_name: dan

backbone:
  name: fcn
  classifier_hidden_dim: 128
  dropout: 0.1

optimization:
  epochs: 70
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0

loss:
  name: mkmmd
  adaptation_weight: 0.05
  adaptation_schedule: warm_start
  adaptation_max_steps: 1000
  adaptation_schedule_alpha: 10.0
  linear_mmd: true
  kernel_scales: [0.125, 0.25, 0.5, 1.0, 2.0]

notes:
  - DAN baseline with configurable MK-MMD kernel bank and warm-start alignment weight.

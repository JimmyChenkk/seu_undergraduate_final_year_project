method_name: tc_cdan

backbone:
  name: fcn
  classifier_hidden_dim: 128
  dropout: 0.1

optimization:
  epochs: 90
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0
  max_grad_norm: 5.0

runtime_defaults:
  model_selection: hybrid_source_eval_target_confidence
  early_stopping_metric: hybrid_source_eval_target_confidence
  selection_weights:
    source_eval: 0.82
    target_confidence: 0.18
  early_stopping_weights:
    source_eval: 0.82
    target_confidence: 0.18

loss:
  name: tc_cdan
  adaptation_weight: 0.28
  adaptation_schedule: warm_start
  adaptation_max_steps: 1400
  adaptation_schedule_alpha: 10.0
  grl_lambda: 0.9
  grl_warm_start: true
  grl_max_iters: 1400
  randomized: true
  randomized_dim: 256
  entropy_conditioning: true
  domain_hidden_dim: 256
  domain_num_hidden_layers: 2
  teacher_ema_decay: 0.995
  teacher_temperature: 1.0
  consistency_weight: 0.04
  consistency_start_step: 500
  consistency_warmup_steps: 1200
  consistency_loss: kl
  augment:
    weak_jitter_std: 0.005
    weak_scaling_std: 0.005
    strong_jitter_std: 0.012
    strong_scaling_std: 0.012
    strong_time_mask_ratio: 0.05
    strong_channel_dropout_prob: 0.05

notes:
  - TC-CDAN is the chapter-3 method: CDAN plus EMA teacher and weak/strong temporal consistency.
  - Target labels are not consumed by this method; target metrics are for validation/reporting only.

method_name: coral

backbone:
  name: fcn
  classifier_hidden_dim: 128
  dropout: 0.1

optimization:
  epochs: 70
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0

loss:
  name: coral
  adaptation_weight: 0.5
  adaptation_schedule: warm_start
  adaptation_max_steps: 1000
  adaptation_schedule_alpha: 10.0
  align_mean: true
  normalize_covariance: true

notes:
  - Deep CORAL baseline with warm-start alignment weight and normalized covariance matching.

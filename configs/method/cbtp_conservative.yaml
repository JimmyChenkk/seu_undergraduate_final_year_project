method_name: cbtp_wjdot
method_display_name: cbtp_conservative

backbone:
  name: fcn_temporal
  embedding_dim: 128
  classifier_hidden_dim: 128
  dropout: 0.15

optimization:
  epochs: 70
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0001

loss:
  name: cbtp_wjdot
  adaptation_weight: 0.35
  source_ce_weight: 1.0
  feature_weight: 0.03
  label_weight: 1.0
  base_tp_mode: tp_barycentric
  prototype_weight: 0.08
  prototype_in_coupling: false
  prototype_distance: normalized_l2
  prototype_cost_clip: p90
  ot_class_entropy_gate: true
  min_class_transport_mass: 0.0001
  class_mass_weight: sqrt
  use_source_class_balance: true
  normalize_costs: true
  transport_solver: sinkhorn
  sinkhorn_reg: 0.05
  sinkhorn_num_iter_max: 100
  tau_start: 0.95
  tau_end: 0.80
  tau_steps: 1200
  alignment_start_step: 350
  alignment_ramp_steps: 700
  prototype_start_step: 700
  prototype_warmup_steps: 1200
  pseudo_start_step: 700
  pseudo_weight: 0.10
  class_balance_clip_min: 0.5
  class_balance_clip_max: 3.0
  consistency_weight: 0.05
  ot_feature_normalize: true
  ot_source_stop_gradient: true
  embedding_norm_weight: 0.0001

notes:
  - Sweep candidates: pseudo_weight in [0.05, 0.10, 0.20], consistency_weight in [0.03, 0.05, 0.10].
  - CBTP keeps confidence curriculum, inverse-sqrt class balance, and Gaussian/time/channel consistency.


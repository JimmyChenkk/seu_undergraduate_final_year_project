method_name: dann

backbone:
  name: fcn
  classifier_hidden_dim: 128
  dropout: 0.1

optimization:
  epochs: 70
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0

loss:
  name: domain_adversarial
  adaptation_weight: 0.5
  adaptation_schedule: warm_start
  adaptation_max_steps: 1000
  adaptation_schedule_alpha: 10.0
  grl_lambda: 1.0
  grl_warm_start: true
  grl_max_iters: 1000
  domain_hidden_dim: 256
  domain_num_hidden_layers: 2

notes:
  - DANN baseline with warm-start GRL and configurable domain discriminator depth.

method_name: dann

backbone:
  name: fcn
  classifier_hidden_dim: 128
  dropout: 0.1

optimization:
  epochs: 10
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0

loss:
  name: domain_adversarial
  adaptation_weight: 0.5
  grl_lambda: 1.0

notes:
  - DANN baseline with a shallow domain discriminator.

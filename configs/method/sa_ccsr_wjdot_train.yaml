method_name: sa_ccsr_wjdot_train
method_display_name: sa_ccsr_wjdot_train

backbone:
  name: fcn
  classifier_hidden_dim: 128
  dropout: 0.1

optimization:
  epochs: 70
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0
  max_grad_norm: 5.0

runtime_defaults:
  model_selection: hybrid_source_eval_target_confidence
  early_stopping_metric: hybrid_source_eval_target_confidence
  selection_weights:
    source_eval: 0.70
    target_confidence: 0.30
  early_stopping_weights:
    source_eval: 0.70
    target_confidence: 0.30

loss:
  name: sa_ccsr_wjdot_train
  adaptation_weight: 0.55
  source_ce_weight: 1.0
  source_ce_reduction: mean
  source_alpha_mode: uniform
  source_alpha_temperature: 1.0
  feature_weight: 0.08
  label_weight: 1.0
  normalize_costs: true
  transport_solver: sinkhorn
  sinkhorn_reg: 0.05
  sinkhorn_num_iter_max: 200
  use_source_class_balance: true
  alignment_start_step: 0
  alignment_ramp_steps: 800
  pseudo_weight: 0.0
  consistency_weight: 0.0
  reliability_start_ratio: 0.30
  reliability_ramp_ratio: 0.20
  reliability_total_steps: 4900
  T_class:
  top_m_per_class:
  floor:
  tau_proto: 0.85
  min_proto_samples: 3
  w_proto: 0.35
  w_ot: 0.35
  w_entropy: 0.20
  w_source_error: 0.10
  class_transport_normalize: true
  sample_outlier_downweight: false

notes:
  - SA-CCSR-WJDOT training variant. Warmup uses uniform class-source alpha, then class-source reliability weights transport loss.

method_name: cbtp_jdot

backbone:
  name: fcn_temporal
  embedding_dim: 128
  classifier_hidden_dim: 128
  dropout: 0.15

optimization:
  epochs: 70
  batch_size: 64
  learning_rate: 0.0001
  weight_decay: 0.0001

loss:
  name: cbtp_jdot
  adaptation_weight: 0.30
  source_ce_weight: 1.0
  feature_weight: 0.03
  label_weight: 1.0
  base_tp_mode: tp_barycentric
  prototype_weight: 0.06
  prototype_in_coupling: false
  prototype_distance: normalized_l2
  prototype_cost_clip: p90
  ot_class_entropy_gate: true
  min_class_transport_mass: 0.0001
  class_mass_weight: sqrt
  use_source_class_balance: false
  normalize_costs: true
  transport_solver: sinkhorn
  sinkhorn_reg: 0.05
  sinkhorn_num_iter_max: 100
  tau_start: 0.95
  tau_end: 0.85
  tau_steps: 1200
  alignment_start_step: 700
  alignment_ramp_steps: 1200
  prototype_start_step: 1200
  prototype_warmup_steps: 1800
  pseudo_start_step: 1200
  pseudo_weight: 0.03
  class_balance_clip_min: 0.5
  class_balance_clip_max: 3.0
  consistency_weight: 0.02
  ot_feature_normalize: true
  ot_source_stop_gradient: true
  embedding_norm_weight: 0.0001

notes:
  - Confidence-Balanced Temporal-Prototype JDOT for the single-source innovation line.
  - Builds on TP-JDOT with a delayed pseudo-label curriculum and target consistency, without source-domain reweighting.

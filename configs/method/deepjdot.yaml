method_name: deepjdot

backbone:
  name: fcn
  classifier_hidden_dim: 128
  dropout: 0.1

optimization:
  epochs: 70
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0

loss:
  name: deepjdot
  adaptation_weight: 0.4
  adaptation_schedule: linear
  adaptation_max_steps: 2000
  adaptation_schedule_alpha: 10.0
  reg_dist: 0.2
  reg_cl: 0.5
  normalize_feature_cost: true
  transport_solver: sinkhorn
  sinkhorn_reg: 0.1
  sinkhorn_num_iter_max: 300

notes:
  - DeepJDOT baseline with normalized feature transport cost, warm-start alignment weight, and Sinkhorn OT for stability.

method_name: deepjdot

backbone:
  name: fcn
  classifier_hidden_dim: 128
  dropout: 0.1

optimization:
  epochs: 70
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0

loss:
  name: deepjdot
  adaptation_weight: 1.0
  adaptation_schedule: constant
  adaptation_max_steps: 2000
  adaptation_schedule_alpha: 10.0
  reg_dist: 0.1
  reg_cl: 1.0
  normalize_feature_cost: false
  transport_solver: emd
  sinkhorn_reg: 0.05
  sinkhorn_num_iter_max: 100

notes:
  - DeepJDOT baseline following the reference fixed-coupling EMD objective with alpha=0.1, beta=1.0, and lambda_ot=1.0.

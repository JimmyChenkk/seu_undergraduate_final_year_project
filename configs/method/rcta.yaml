method_name: rcta

backbone:
  name: fcn
  classifier_hidden_dim: 128
  dropout: 0.1

optimization:
  epochs: 70
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0
  max_grad_norm: 5.0

runtime_defaults:
  model_selection: hybrid_source_eval_inverse_entropy
  early_stopping_metric: hybrid_source_eval_inverse_entropy
  selection_weights:
    source_eval: 0.7
    target_entropy: 0.3
  early_stopping_weights:
    source_eval: 0.7
    target_entropy: 0.3

loss:
  base_align: cdan
  use_mcc: true
  mcc_weight: 0.06
  mcc_temperature: 2.0
  teacher_ema_decay: 0.997
  teacher_temperature: 1.4
  reliability_weights:
    cal_conf: 1.3
    inv_entropy: 1.0
    consistency: 1.1
    proto_sim: 0.8
  gate_score_floor: 0.56
  gate_score_floor_start: 0.38
  gate_score_floor_end: 0.58
  gate_score_floor_schedule_steps: 2200
  gate_accept_ratio_start: 0.12
  gate_accept_ratio_end: 0.68
  gate_curriculum_steps: 2000
  # Default keeps the historical per-class ratio selector. Experimental runs can
  # switch to class_balanced_budget to cap dominant pseudo-label classes.
  gate_balance_mode: per_class_ratio
  gate_max_class_fraction: 1.0
  pseudo_label_weight: 0.16
  pseudo_warmup_steps: 1200
  pseudo_use_reliability_weighting: true
  pseudo_confidence_power: 1.35
  prototype_weight: 0.10
  semi_reliable_consistency_weight: 0.25
  unreliable_entropy_weight: 0.08
  alignment_start_step: 1100
  alignment_use_reliable_only: true
  prototype_start_step: 900
  prototype_warmup_steps: 1600
  prototype_separation_weight: 0.10
  consistency_weight: 0.05
  consistency_start_step: 700
  consistency_warmup_steps: 1400
  consistency_gate_only: false
  consistency_reliability_power: 1.2
  alignment_start_step: 1100
  alignment_use_reliable_only: true
  prototype_momentum: 0.94
  prototype_separation_margin: 0.28
  # Default preserves the original target prototype behavior.
  target_prototype_update_mode: all
  target_prototype_blend_start: 1.0
  target_prototype_blend_end: 1.0
  target_prototype_blend_schedule_steps: 1
  # Multi-source reliability weighting is opt-in for new experiments.
  multi_source_weighting: false
  source_weight_temperature: 4.0
  source_weight_momentum: 0.0
  source_weight_floor: 0.0
  source_weight_proto: 1.0
  source_weight_confidence: 0.0
  source_weight_coverage: 0.0
  hybrid_aligners: [dann, cdan, dan]
  hybrid_alignment_weights:
    dann: 0.4
    cdan: 0.4
    dan: 0.2
  augment:
    weak_jitter_std: 0.006
    weak_scaling_std: 0.006
    strong_jitter_std: 0.014
    strong_scaling_std: 0.014
    strong_time_mask_ratio: 0.06
    strong_channel_dropout_prob: 0.05
  cdan:
    adaptation_weight: 0.28
    adaptation_schedule: warm_start
    adaptation_max_steps: 1200
    adaptation_schedule_alpha: 10.0
    grl_lambda: 1.0
    grl_warm_start: true
    grl_max_iters: 1200
    randomized: true
    randomized_dim: 256
    entropy_conditioning: true
    domain_hidden_dim: 256
    domain_num_hidden_layers: 2
  dann:
    adaptation_weight: 0.40
    adaptation_schedule: warm_start
    adaptation_max_steps: 1200
    adaptation_schedule_alpha: 10.0
    grl_lambda: 1.0
    grl_warm_start: true
    grl_max_iters: 1200
    domain_hidden_dim: 256
    domain_num_hidden_layers: 2
  dan:
    adaptation_weight: 0.08
    adaptation_schedule: warm_start
    adaptation_max_steps: 1200
    adaptation_schedule_alpha: 10.0
    kernel_scales: [0.25, 0.5, 1.0, 2.0, 4.0]
    linear_mmd: false
  deepjdot:
    adaptation_weight: 1.0
    adaptation_schedule: constant
    adaptation_max_steps: 1200
    adaptation_schedule_alpha: 10.0
    reg_dist: 0.1
    reg_cl: 1.0
    normalize_feature_cost: false
    transport_solver: emd
    sinkhorn_reg: 0.05
    sinkhorn_num_iter_max: 100

notes:
  - RCTA uses reliability-aware self-training with prototype guidance and scheduled alignment.
  - The method keeps one implementation path and supports CDAN, DANN, DAN, DeepJDOT, hybrid alignment, and optional reliability-weighted multi-source training.

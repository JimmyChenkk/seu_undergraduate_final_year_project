method_name: ccsr_safe
method_display_name: ccsr_safe

backbone:
  name: fcn
  classifier_hidden_dim: 128
  dropout: 0.1

optimization:
  epochs: 70
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0
  max_grad_norm: 5.0

loss:
  name: ccsr_safe
  prediction_mode: ccsr_safe
  tau_proto: 0.85
  min_proto_samples: 3
  proto_probability_temperature: 0.25
  w_proto: 0.35
  w_ot: 0.35
  w_entropy: 0.20
  w_source_error: 0.10
  lambda_safe: 0.75
  rho_mode: simple
  rho_min: 0.2
  rho_max: 0.95
  override_on_source_agreement: true
  override_agreement_threshold: 0.8
  override_entropy_threshold: 0.98
  override_alpha_concentration_min: 0.0
  override_strength: 1.0
  source_meta_calibration: false

notes:
  - Conservative posthoc gate, kept for comparison with the previous CCSR-WJDOT behavior.

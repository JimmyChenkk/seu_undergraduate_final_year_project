method_name: rpl_tc_cdan

backbone:
  name: fcn
  classifier_hidden_dim: 128
  dropout: 0.1

optimization:
  epochs: 100
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0
  max_grad_norm: 5.0

runtime_defaults:
  model_selection: hybrid_source_eval_confidence_guard
  early_stopping_metric: hybrid_source_eval_confidence_guard
  selection_weights:
    source_eval: 0.80
    target_confidence: 0.20
    overconfidence: 0.60
  selection_params:
    confidence_ceiling: 0.92
  early_stopping_weights:
    source_eval: 0.80
    target_confidence: 0.20
    overconfidence: 0.60
  early_stopping_params:
    confidence_ceiling: 0.92

loss:
  name: rpl_tc_cdan
  adaptation_weight: 0.26
  adaptation_schedule: warm_start
  adaptation_max_steps: 1400
  adaptation_schedule_alpha: 10.0
  grl_lambda: 0.9
  grl_warm_start: true
  grl_max_iters: 1400
  randomized: true
  randomized_dim: 256
  entropy_conditioning: true
  domain_hidden_dim: 256
  domain_num_hidden_layers: 2
  teacher_ema_decay: 0.996
  teacher_temperature: 1.0
  consistency_weight: 0.035
  consistency_start_step: 500
  consistency_warmup_steps: 1200
  consistency_loss: kl
  pseudo_weight: 0.07
  pseudo_start_step: 1200
  pseudo_warmup_steps: 800
  pseudo_confidence_threshold: 0.78
  pseudo_entropy_threshold: 0.50
  pseudo_max_per_class: 4
  pseudo_use_reliability_weighting: true
  reliability_weights:
    confidence: 1.2
    inverse_entropy: 1.0
    agreement: 1.1
  augment:
    weak_jitter_std: 0.005
    weak_scaling_std: 0.005
    strong_jitter_std: 0.012
    strong_scaling_std: 0.012
    strong_time_mask_ratio: 0.05
    strong_channel_dropout_prob: 0.05

notes:
  - RPL-TC-CDAN is the chapter-4 method: TC-CDAN plus conservative reliable pseudo-label supervision.
  - Pseudo-labels start late and are class-balanced by per-class top-k to avoid dominant-class collapse.

method_name: dann

backbone:
  name: fcn
  classifier_hidden_dim: 0
  dropout: 0.0

optimization:
  epochs: 20
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0

loss:
  name: domain_adversarial
  adaptation_weight: 0.5
  grl_lambda: 1.0

notes:
  - Reference-aligned DANN config for a medium-length runtime probe.
  - Keeps the stronger shared architecture while limiting exposure time for aggressive GPU runtime settings.

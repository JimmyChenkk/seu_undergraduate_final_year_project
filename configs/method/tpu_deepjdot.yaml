method_name: tpu_deepjdot

backbone:
  name: fcn
  classifier_hidden_dim: 128
  dropout: 0.1

optimization:
  epochs: 120
  batch_size: 64
  learning_rate: 0.0001
  weight_decay: 0.0
  max_grad_norm: 5.0

loss:
  name: tpu_deepjdot
  adaptation_weight: 0.55
  adaptation_schedule: warm_start
  adaptation_max_steps: 2200
  adaptation_schedule_alpha: 10.0
  reg_dist: 0.08
  reg_cl: 1.0
  normalize_feature_cost: true
  transport_solver: sinkhorn_unbalanced
  sinkhorn_reg: 0.05
  sinkhorn_num_iter_max: 200
  unbalanced_transport: true
  uot_tau_s: 1.0
  uot_tau_t: 1.0
  use_ce_cost_for_plan: true
  source_warmup_steps: 500
  alignment_start_step: 500
  supcon_weight: 0.04
  supcon_temperature: 0.10
  supcon_warmup_only: true
  prototype_cost_weight: 0.015
  prototype_distance: normalized_l2
  prototype_momentum: 0.95
  prototype_start_step: 500
  prototype_warmup_steps: 800
  prototype_relative_min: -1.0
  prototype_relative_max: 3.0
  temporal_cost_weight: 0.01
  temporal_start_step: 500
  temporal_warmup_steps: 800

notes:
  - TPU-DeepJDOT uses source CE plus warmup supervised contrastive loss, normalized EMA source prototypes, relative prototype cost shaping, temporal cost shaping, and UOT.
  - It intentionally does not use target confidence, target pseudo CE, consistency, or target labels.
